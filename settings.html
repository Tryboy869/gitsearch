<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <title>GITSEARCH — Settings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link href="https://unpkg.com/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
  <style>
    :root{
      --bg:#0a0e1a;
      --card:#0d1220;
      --accent:#7b2cbf;
      --cyan:#00d4ff;
      --pink:#ff006e;
      --text:#f1f5f9;
      --sub:#9ca3af;
      --line:#1e293b;
      font-family:Courier New,monospace;
    }
    body{background:var(--bg);color:var(--text);}
    .bg-bg{background:var(--bg);}
    .bg-card{background:var(--card);}
    .text-accent{color:var(--accent);}
    .text-cyan{color:var(--cyan);}
    .text-pink{color:var(--pink);}
    .border-line{border-color:var(--line);}
    .border-accent{border-color:var(--accent);}
    .focus\\:border-accent:focus{border-color:var(--accent);}
    .shadow-accent{box-shadow:0 0 8px var(--accent);}
    .fadeIn{animation:fadeIn .4s forwards;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
    .progress-bar{height:6px;background:var(--line);border-radius:3px;overflow:hidden;}
    .progress-bar div{height:100%;background:var(--accent);}
  </style>
</head>
<body class="antialiased bg-bg">
  <header id="header" class="fixed top-0 left-0 right-0 h-16 bg-bg bg-opacity-90 backdrop-blur z-40 flex items-center justify-between px-4 border-b border-line">
    <a href="/" class="flex items-center space-x-2">
      <img src="assets/logo.svg" alt="GitSearch" class="h-8"/>
      <span class="text-accent font-bold text-lg">GITSEARCH</span>
    </a>
    <nav class="flex items-center space-x-4 text-sm">
      <a href="/" class="hover:text-accent transition">Search</a>
      <a href="/history.html" class="hover:text-accent transition">History</a>
      <a href="/settings.html" class="text-accent border-b-2 border-accent pb-1">Settings</a>
    </nav>
  </header>

  <main class="max-w-3xl mx-auto p-4 space-y-8 mt-20">
    <h1 class="text-2xl font-bold text-accent">Settings</h1>

    <!-- Auth -->
    <section class="bg-card border border-line rounded p-4 space-y-4">
      <h2 class="text-lg font-semibold text-cyan">GitHub Authentication</h2>
      <div>
        <label class="block text-sm mb-1">Username</label>
        <input id="username" type="text" placeholder="yourname" class="w-full px-3 py-2 bg-bg border border-line rounded focus:outline-none focus:border-accent transition"/>
      </div>
      <div>
        <label class="block text-sm mb-1">Personal Access Token</label>
        <div class="flex space-x-2">
          <input id="token" type="password" placeholder="ghp_..." class="flex-1 px-3 py-2 bg-bg border border-line rounded focus:outline-none focus:border-accent transition"/>
          <button id="toggleToken" class="px-3 py-2 border border-line rounded hover:border-accent transition">Show</button>
        </div>
      </div>
      <button id="validateAuth" class="px-4 py-2 bg-accent text-bg rounded hover:shadow-accent transition">Validate</button>
      <div id="authStatus" class="text-sm"></div>
    </section>

    <!-- Rate Limit -->
    <section class="bg-card border border-line rounded p-4 space-y-4">
      <h2 class="text-lg font-semibold text-cyan">Rate Limit Status</h2>
      <div>
        <div class="flex justify-between text-sm mb-1">
          <span>Core</span>
          <span id="core-count">—</span>
        </div>
        <div class="progress-bar">
          <div id="core-bar" style="width:0%"></div>
        </div>
        <div class="text-xs text-sub mt-1">Reset: <span id="core-reset">—</span></div>
      </div>
      <div>
        <div class="flex justify-between text-sm mb-1">
          <span>Search</span>
          <span id="search-count">—</span>
        </div>
        <div class="progress-bar">
          <div id="search-bar" style="width:0%"></div>
        </div>
        <div class="text-xs text-sub mt-1">Reset: <span id="search-reset">—</span></div>
      </div>
      <button id="refreshRate" class="px-3 py-1 border border-line rounded hover:border-accent transition text-sm">Refresh</button>
    </section>

    <!-- Snippet Generator -->
    <section class="bg-card border border-line rounded p-4 space-y-4">
      <h2 class="text-lg font-semibold text-cyan">Snippet Generator</h2>
      <div>
        <label class="block text-sm mb-1">GitHub username</label>
        <input id="snippetUser" type="text" placeholder="USER" class="w-full px-3 py-2 bg-bg border border-line rounded focus:outline-none focus:border-accent transition"/>
      </div>
      <div>
        <label class="block text-sm mb-1">Repository</label>
        <input id="snippetRepo" type="text" placeholder="REPO" class="w-full px-3 py-2 bg-bg border border-line rounded focus:outline-none focus:border-accent transition"/>
      </div>
      <div>
        <label class="block text-sm mb-1">Tags (comma separated)</label>
        <input id="snippetTags" type="text" placeholder="tag1, tag2, tag3" class="w-full px-3 py-2 bg-bg border border-line rounded focus:outline-none focus:border-accent transition"/>
      </div>
      <div class="space-y-2">
        <div class="flex items-center justify-between">
          <span class="text-sm">Badge URL</span>
          <button id="copyBadge" class="px-3 py-1 border border-line rounded hover:border-accent transition text-sm">Copy</button>
        </div>
        <pre id="badgeOut" class="text-xs bg-bg border border-line rounded p-2 overflow-x-auto">Fill fields to generate</pre>
      </div>
      <div class="space-y-2">
        <div class="flex items-center justify-between">
          <span class="text-sm">Markdown</span>
          <button id="copyMd" class="px-3 py-1 border border-line rounded hover:border-accent transition text-sm">Copy</button>
        </div>
        <pre id="mdOut" class="text-xs bg-bg border border-line rounded p-2 overflow-x-auto">Fill fields to generate</pre>
      </div>
      <div class="space-y-2">
        <div class="flex items-center justify-between">
          <span class="text-sm">HTML Comment</span>
          <button id="copyComment" class="px-3 py-1 border border-line rounded hover:border-accent transition text-sm">Copy</button>
        </div>
        <pre id="commentOut" class="text-xs bg-bg border border-line rounded p-2 overflow-x-auto">Fill fields to generate</pre>
      </div>
    </section>

    <!-- Preferences -->
    <section class="bg-card border border-line rounded p-4 space-y-4">
      <h2 class="text-lg font-semibold text-cyan">Preferences</h2>
      <label class="flex items-center justify-between">
        <span class="text-sm">Save search history</span>
        <input id="saveHistory" type="checkbox" class="w-4 h-4 accent-accent"/>
      </label>
      <label class="flex items-center justify-between">
        <span class="text-sm">Semantic expansion</span>
        <input id="semanticExpansion" type="checkbox" class="w-4 h-4 accent-accent"/>
      </label>
      <label class="flex items-center justify-between">
        <span class="text-sm">GitSearch-only mode</span>
        <input id="gitsearchOnly" type="checkbox" class="w-4 h-4 accent-accent"/>
      </label>
    </section>

    <!-- Danger Zone -->
    <section class="bg-card border border-red-800 rounded p-4 space-y-4" style="background:#1a0000">
      <h2 class="text-lg font-semibold text-pink">Danger Zone</h2>
      <div class="flex space-x-4">
        <button id="clearHistory" class="px-4 py-2 border border-red-600 text-red-400 rounded hover:bg-red-900 hover:text-white transition">Clear History</button>
        <button id="resetAll" class="px-4 py-2 border border-red-600 text-red-400 rounded hover:bg-red-900 hover:text-white transition">Reset All Data</button>
      </div>
    </section>
  </main>

  <script>
    window.onload = () => {
      const dbName = 'gitsearch_v1';
      const storeConfig = 'config';
      const storeSearches = 'searches';
      let db;

      const openDB = () => {
        return new Promise((resolve, reject) => {
          const req = indexedDB.open(dbName);
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
        });
      };

      const getConfig = async (key) => {
        if (!db) db = await openDB();
        return new Promise((resolve) => {
          const tx = db.transaction(storeConfig, 'readonly');
          const st = tx.objectStore(storeConfig);
          const req = st.get(key);
          req.onsuccess = () => resolve(req.result ? req.result.value : null);
        });
      };

      const setConfig = async (key, value) => {
        if (!db) db = await openDB();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(storeConfig, 'readwrite');
          const st = tx.objectStore(storeConfig);
          const req = st.put({key, value});
          req.onsuccess = () => resolve();
          req.onerror = () => reject(req.error);
        });
      };

      // Auth
      const username = document.getElementById('username');
      const token = document.getElementById('token');
      const toggleToken = document.getElementById('toggleToken');
      const validateAuth = document.getElementById('validateAuth');
      const authStatus = document.getElementById('authStatus');

      toggleToken.onclick = () => {
        token.type = token.type === 'password' ? 'text' : 'password';
        toggleToken.textContent = token.type === 'password' ? 'Show' : 'Hide';
      };

      validateAuth.onclick = async () => {
        const val = token.value.trim();
        if (!val) { authStatus.textContent = 'Token required'; authStatus.className = 'text-sm text-pink'; return; }
        authStatus.textContent = 'Validating...';
        authStatus.className = 'text-sm text-sub';
        fetch('https://api.github.com/user', {
          headers: {Authorization: `token ${val}`}
        })
          .then(r => r.json())
          .then(async u => {
            if (u.login) {
              authStatus.textContent = `✓ Authenticated as ${u.login}`;
              authStatus.className = 'text-sm text-cyan';
              await setConfig('gh_token', val);
              await setConfig('gh_username', u.login);
              username.value = u.login;
            } else {
              authStatus.textContent = '✗ Invalid token';
              authStatus.className = 'text-sm text-pink';
            }
          })
          .catch(() => {
            authStatus.textContent = '✗ Network error';
            authStatus.className = 'text-sm text-pink';
          });
      };

      // Rate limit
      const coreBar = document.getElementById('core-bar');
      const coreCount = document.getElementById('core-count');
      const coreReset = document.getElementById('core-reset');
      const searchBar = document.getElementById('search-bar');
      const searchCount = document.getElementById('search-count');
      const searchReset = document.getElementById('search-reset');
      const refreshRate = document.getElementById('refreshRate');

      const loadRate = async () => {
        const tok = await getConfig('gh_token');
        const headers = tok ? {Authorization: `token ${tok}`} : {};
        fetch('https://api.github.com/rate_limit', {headers})
          .then(r => r.json())
          .then(d => {
            const c = d.resources.core;
            const s = d.resources.search;
            const cUsed = c.used;
            const cTotal = c.limit;
            const cLeft = cTotal - cUsed;
            const cPct = cTotal ? (cUsed / cTotal) * 100 : 0;
            coreBar.style.width = `${cPct}%`;
            coreCount.textContent = `${cLeft}/${cTotal}`;
            coreReset.textContent = new Date(c.reset * 1000).toLocaleTimeString();

            const sUsed = s.used;
            const sTotal = s.limit;
            const sLeft = sTotal - sUsed;
            const sPct = sTotal ? (sUsed / sTotal) * 100 : 0;
            searchBar.style.width = `${sPct}%`;
            searchCount.textContent = `${sLeft}/${sTotal}`;
            searchReset.textContent = new Date(s.reset * 1000).toLocaleTimeString();
          })
          .catch(() => {
            coreCount.textContent = '—';
            searchCount.textContent = '—';
          });
      };

      refreshRate.onclick = loadRate;

      // Snippet
      const snippetUser = document.getElementById('snippetUser');
      const snippetRepo = document.getElementById('snippetRepo');
      const snippetTags = document.getElementById('snippetTags');
      const badgeOut = document.getElementById('badgeOut');
      const mdOut = document.getElementById('mdOut');
      const commentOut = document.getElementById('commentOut');
      const copyBadge = document.getElementById('copyBadge');
      const copyMd = document.getElementById('copyMd');
      const copyComment = document.getElementById('copyComment');

      const buildSnippet = () => {
        const u = snippetUser.value.trim();
        const r = snippetRepo.value.trim();
        const t = snippetTags.value.trim();
        if (!u || !r) {
          badgeOut.textContent = 'Fill fields to generate';
          mdOut.textContent = 'Fill fields to generate';
          commentOut.textContent = 'Fill fields to generate';
          return;
        }
        const badgeUrl = `https://raw.githubusercontent.com/${u}/${r}/main/assets/badges/badge-indexed.svg`;
        const siteUrl = `https://gitsearch.example.com`;
        badgeOut.textContent = badgeUrl;
        mdOut.textContent = `[![GITSEARCH](${badgeUrl})](${siteUrl})`;
        commentOut.textContent = `<!-- gitsearch: ${t || 'tag1, tag2, tag3'} -->`;
      };

      snippetUser.oninput = buildSnippet;
      snippetRepo.oninput = buildSnippet;
      snippetTags.oninput = buildSnippet;

      const copyToClipboard = (text, btn) => {
        navigator.clipboard.writeText(text).then(() => {
          const orig = btn.textContent;
          btn.textContent = '✓ Copied';
          setTimeout(() => btn.textContent = orig, 2000);
        });
      };

      copyBadge.onclick = () => copyToClipboard(badgeOut.textContent, copyBadge);
      copyMd.onclick = () => copyToClipboard(mdOut.textContent, copyMd);
      copyComment.onclick = () => copyToClipboard(commentOut.textContent, copyComment);

      // Preferences
      const saveHistory = document.getElementById('saveHistory');
      const semanticExpansion = document.getElementById('semanticExpansion');
      const gitsearchOnly = document.getElementById('gitsearchOnly');

      const loadPrefs = async () => {
        saveHistory.checked = (await getConfig('save_history')) !== 'off';
        semanticExpansion.checked = (await getConfig('semantic_expansion')) !== 'off';
        gitsearchOnly.checked = (await getConfig('gitsearch_only')) === 'on';
      };

      saveHistory.onchange = async () => await setConfig('save_history', saveHistory.checked ? 'on' : 'off');
      semanticExpansion.onchange = async () => await setConfig('semantic_expansion', semanticExpansion.checked ? 'on' : 'off');
      gitsearchOnly.onchange = async () => await setConfig('gitsearch_only', gitsearchOnly.checked ? 'on' : 'off');

      // Danger
      const clearHistory = document.getElementById('clearHistory');
      const resetAll = document.getElementById('resetAll');

      clearHistory.onclick = async () => {
        if (!confirm('Delete all search history?')) return;
        if (!db) db = await openDB();
        const tx = db.transaction(storeSearches, 'readwrite');
        tx.objectStore(storeSearches).clear();
        tx.oncomplete = () => alert('History cleared');
      };

      resetAll.onclick = async () => {
        if (!confirm('Delete entire database and reload?')) return;
        indexedDB.deleteDatabase(dbName);
        location.reload();
      };

      // Init
      (async () => {
        await loadPrefs();
        const savedToken = await getConfig('gh_token');
        const savedUser = await getConfig('gh_username');
        if (savedToken) token.value = savedToken;
        if (savedUser) username.value = savedUser;
        await loadRate();
      })();
    };
  </script>
</body>
</html>
