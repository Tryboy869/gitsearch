<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - GITSEARCH</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e1a;
            --card: #0d1220;
            --accent: #7b2cbf;
            --cyan: #00d4ff;
            --text: #f1f5f9;
        }
        body {
            background-color: var(--bg);
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <header class="sticky top-0 bg-card py-2 flex justify-between items-center">
        <img src="assets/logo.svg" alt="GITSEARCH" class="h-10">
        <input type="search" id="search-input" class="px-2 py-1 rounded-md focus:ring-accent focus:ring-2" placeholder="Rechercher...">
        <nav>
            <ul class="flex items-center space-x-4">
                <li><a href="index.html" class="text-text hover:text-accent">Home</a></li>
                <li><a href="dashboard.html" class="text-text hover:text-accent">Dashboard</a></li>
                <li><a href="settings.html" class="text-accent">Settings</a></li>
            </ul>
        </nav>
    </header>
    <main class="container mx-auto p-4 pt-6 md:p-6 lg:p-12">
        <h1 class="text-3xl text-text mb-4">Settings</h1>
        <section class="mb-8">
            <h2 class="text-2xl text-text mb-2">GitHub Auth</h2>
            <form id="github-auth-form">
                <div class="mb-4">
                    <label for="username" class="block text-text mb-2">Username</label>
                    <input type="text" id="username" class="block w-full p-2 rounded-md focus:ring-accent focus:ring-2" required>
                </div>
                <div class="mb-4">
                    <label for="token" class="block text-text mb-2">Token</label>
                    <input type="password" id="token" class="block w-full p-2 rounded-md focus:ring-accent focus:ring-2" required>
                    <button type="button" id="toggle-token" class="ml-2 text-text hover:text-accent">Show/Hide</button>
                </div>
                <button type="submit" class="bg-accent text-text py-2 px-4 rounded-md hover:bg-accent-dark">Save</button>
                <p id="auth-status" class="text-text mt-2"></p>
            </form>
        </section>
        <section class="mb-8">
            <h2 class="text-2xl text-text mb-2">Rate Limit Monitor</h2>
            <div class="flex justify-between mb-4">
                <div class="w-1/2 mr-4">
                    <h3 class="text-xl text-text mb-2">Core</h3>
                    <div class="bg-gray-200 h-4 rounded-md">
                        <div id="core-limit" class="bg-accent h-4 rounded-md" style="width: 0%"></div>
                    </div>
                    <p id="core-limit-text" class="text-text mt-2">0/5000</p>
                </div>
                <div class="w-1/2">
                    <h3 class="text-xl text-text mb-2">Search</h3>
                    <div class="bg-gray-200 h-4 rounded-md">
                        <div id="search-limit" class="bg-accent h-4 rounded-md" style="width: 0%"></div>
                    </div>
                    <p id="search-limit-text" class="text-text mt-2">0/30</p>
                </div>
            </div>
            <button id="refresh-limits" class="bg-accent text-text py-2 px-4 rounded-md hover:bg-accent-dark">Refresh</button>
        </section>
        <section class="mb-8">
            <h2 class="text-2xl text-text mb-2">Snippet Generator</h2>
            <form id="snippet-form">
                <div class="mb-4">
                    <label for="repo-url" class="block text-text mb-2">Repository URL</label>
                    <input type="text" id="repo-url" class="block w-full p-2 rounded-md focus:ring-accent focus:ring-2" required>
                </div>
                <div class="mb-4">
                    <label for="tags" class="block text-text mb-2">Tags</label>
                    <input type="text" id="tags" class="block w-full p-2 rounded-md focus:ring-accent focus:ring-2" required>
                </div>
                <div class="mb-4">
                    <label for="badge-preview" class="block text-text mb-2">Badge Preview</label>
                    <img id="badge-preview" src="https://raw.githubusercontent.com/Tryboy869/gitsearch/main/assets/badges/badge-indexed.svg" alt="Badge Preview" class="w-full">
                    <p id="badge-html" class="text-text mt-2"></p>
                </div>
                <button type="button" id="copy-to-clipboard" class="bg-accent text-text py-2 px-4 rounded-md hover:bg-accent-dark">Copy to Clipboard</button>
            </form>
        </section>
        <section class="mb-8">
            <h2 class="text-2xl text-text mb-2">Préférences</h2>
            <form id="preferences-form">
                <div class="mb-4">
                    <label for="save-history" class="block text-text mb-2">Save History</label>
                    <input type="checkbox" id="save-history" class="mr-2">
                </div>
                <div class="mb-4">
                    <label for="semantic-expansion" class="block text-text mb-2">Semantic Expansion</label>
                    <input type="checkbox" id="semantic-expansion" class="mr-2">
                </div>
                <div class="mb-4">
                    <label for="gitsearch-only" class="block text-text mb-2">Gitsearch Only Mode</label>
                    <input type="checkbox" id="gitsearch-only" class="mr-2">
                </div>
                <button type="submit" class="bg-accent text-text py-2 px-4 rounded-md hover:bg-accent-dark">Save</button>
            </form>
        </section>
        <section class="bg-red-800 p-4 text-text">
            <h2 class="text-2xl mb-2">Danger Zone</h2>
            <button id="clear-history" class="bg-accent text-text py-2 px-4 rounded-md hover:bg-accent-dark">Clear History</button>
            <button id="reset-all" class="bg-accent text-text py-2 px-4 rounded-md hover:bg-accent-dark">Reset All</button>
        </section>
    </main>
    <script>
        // GitHub Auth
        const githubAuthForm = document.getElementById('github-auth-form');
        const usernameInput = document.getElementById('username');
        const tokenInput = document.getElementById('token');
        const toggleTokenButton = document.getElementById('toggle-token');
        const authStatusText = document.getElementById('auth-status');

        githubAuthForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = usernameInput.value;
            const token = tokenInput.value;
            try {
                const response = await fetch('https://api.github.com/user', {
                    headers: {
                        Authorization: `Bearer ${token}`,
                    },
                });
                if (response.ok) {
                    authStatusText.textContent = 'Authenticated successfully';
                    authStatusText.classList.remove('text-red-500');
                    authStatusText.classList.add('text-green-500');
                    // Save token to IndexedDB
                    const db = await openDB('gitsearch_v1', 1);
                    const tx = db.transaction('config', 'readwrite');
                    const store = tx.objectStore('config');
                    store.put({ key: 'githubToken', value: token });
                } else {
                    authStatusText.textContent = 'Authentication failed';
                    authStatusText.classList.remove('text-green-500');
                    authStatusText.classList.add('text-red-500');
                }
            } catch (error) {
                console.error(error);
            }
        });

        toggleTokenButton.addEventListener('click', () => {
            if (tokenInput.type === 'password') {
                tokenInput.type = 'text';
                toggleTokenButton.textContent = 'Hide';
            } else {
                tokenInput.type = 'password';
                toggleTokenButton.textContent = 'Show';
            }
        });

        // Rate Limit Monitor
        const coreLimitDiv = document.getElementById('core-limit');
        const coreLimitText = document.getElementById('core-limit-text');
        const searchLimitDiv = document.getElementById('search-limit');
        const searchLimitText = document.getElementById('search-limit-text');
        const refreshLimitsButton = document.getElementById('refresh-limits');

        refreshLimitsButton.addEventListener('click', async () => {
            try {
                const response = await fetch('https://api.github.com/rate_limit');
                const data = await response.json();
                const coreLimit = data.resources.core;
                const searchLimit = data.resources.search;
                coreLimitDiv.style.width = `${(coreLimit.used / coreLimit.limit) * 100}%`;
                coreLimitText.textContent = `${coreLimit.used}/${coreLimit.limit}`;
                searchLimitDiv.style.width = `${(searchLimit.used / searchLimit.limit) * 100}%`;
                searchLimitText.textContent = `${searchLimit.used}/${searchLimit.limit}`;
            } catch (error) {
                console.error(error);
            }
        });

        // Snippet Generator
        const snippetForm = document.getElementById('snippet-form');
        const repoUrlInput = document.getElementById('repo-url');
        const tagsInput = document.getElementById('tags');
        const badgePreviewImg = document.getElementById('badge-preview');
        const badgeHtmlText = document.getElementById('badge-html');
        const copyToClipboardButton = document.getElementById('copy-to-clipboard');

        snippetForm.addEventListener('input', () => {
            const repoUrl = repoUrlInput.value;
            const tags = tagsInput.value;
            const badgeUrl = `https://raw.githubusercontent.com/Tryboy869/gitsearch/main/assets/badges/badge-indexed.svg`;
            badgePreviewImg.src = badgeUrl;
            badgeHtmlText.textContent = `<img src="${badgeUrl}" alt="Badge">`;
        });

        copyToClipboardButton.addEventListener('click', () => {
            navigator.clipboard.writeText(badgeHtmlText.textContent);
        });

        // Préférences
        const preferencesForm = document.getElementById('preferences-form');
        const saveHistoryCheckbox = document.getElementById('save-history');
        const semanticExpansionCheckbox = document.getElementById('semantic-expansion');
        const gitsearchOnlyCheckbox = document.getElementById('gitsearch-only');

        preferencesForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const saveHistory = saveHistoryCheckbox.checked;
            const semanticExpansion = semanticExpansionCheckbox.checked;
            const gitsearchOnly = gitsearchOnlyCheckbox.checked;
            // Save preferences to IndexedDB
            const db = await openDB('gitsearch_v1', 1);
            const tx = db.transaction('config', 'readwrite');
            const store = tx.objectStore('config');
            store.put({ key: 'saveHistory', value: saveHistory });
            store.put({ key: 'semanticExpansion', value: semanticExpansion });
            store.put({ key: 'gitsearchOnly', value: gitsearchOnly });
        });

        // Danger Zone
        const clearHistoryButton = document.getElementById('clear-history');
        const resetAllButton = document.getElementById('reset-all');

        clearHistoryButton.addEventListener('click', async () => {
            if (confirm('Are you sure you want to clear your search history?')) {
                // Clear search history from IndexedDB
                const db = await openDB('gitsearch_v1', 1);
                const tx = db.transaction('searches', 'readwrite');
                const store = tx.objectStore('searches');
                store.clear();
            }
        });

        resetAllButton.addEventListener('click', async () => {
            if (confirm('Are you sure you want to reset all settings and clear your search history?')) {
                // Reset all settings and clear search history from IndexedDB
                const db = await openDB('gitsearch_v1', 1);
                const tx = db.transaction(['config', 'searches'], 'readwrite');
                const configStore = tx.objectStore('config');
                const searchesStore = tx.objectStore('searches');
                configStore.clear();
                searchesStore.clear();
            }
        });

        // OpenDB
        async function openDB(name, version) {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(name, version);
                request.onsuccess = (e) => {
                    resolve(e.target.result);
                };
                request.onerror = (e) => {
                    reject(e);
                };
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    db.createObjectStore('config', { keyPath: 'key' });
                    db.createObjectStore('searches', { keyPath: 'id', autoIncrement: true });
                };
            });
        }
    </script>
</body>
</html>
