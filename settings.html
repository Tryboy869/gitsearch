<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Settings – GitSearch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Courier+New&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e1a;
      --card: #0d1220;
      --accent: #7b2cbf;
      --text: #f1f5f9;
      --sub: #9ca3af;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
    }
    .bar {
      height: 6px;
      border-radius: 3px;
    }
    .bar-green {
      background: #10b981;
    }
    .bar-yellow {
      background: #f59e0b;
    }
    .bar-pink {
      background: #ec4899;
    }
    .btn-accent {
      background: var(--accent);
      color: #fff;
    }
    .btn-accent:hover {
      opacity: 0.9;
    }
    .input-dark {
      background: #111827;
      border: 1px solid #374151;
      color: var(--text);
    }
    .input-dark:focus {
      border-color: var(--accent);
      outline: none;
    }
    .danger-zone {
      background: #1a0000;
      border: 1px solid #991b1b;
    }
  </style>
</head>
<body class="min-h-screen">
  <header class="flex items-center justify-between px-6 py-4" style="background:#0d1220">
    <div class="flex items-center space-x-3">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/>
      </svg>
      <a href="index.html" class="text-lg font-bold">GitSearch</a>
    </div>
    <nav class="flex items-center space-x-4 text-sm">
      <a href="index.html" class="hover:text-accent">Search</a>
      <a href="dashboard.html" class="hover:text-accent">Dashboard</a>
      <a href="settings.html" class="text-accent">Settings</a>
    </nav>
  </header>

  <main class="max-w-4xl mx-auto px-6 py-8 space-y-10">
    <!-- Auth -->
    <section class="p-6 rounded-lg" style="background:var(--card)">
      <h2 class="text-xl font-bold mb-4">GitHub Auth</h2>
      <form id="authForm" class="space-y-4">
        <div>
          <label class="block text-sm mb-1">Username</label>
          <input id="username" type="text" class="w-full px-3 py-2 rounded input-dark" required>
        </div>
        <div>
          <label class="block text-sm mb-1">Token</label>
          <div class="flex items-center space-x-2">
            <input id="token" type="password" class="flex-1 px-3 py-2 rounded input-dark" required>
            <button type="button" id="toggleToken" class="px-3 py-2 rounded border border-gray-700 text-xs hover:border-accent">Show</button>
          </div>
          <p class="text-xs mt-1" style="color:var(--sub)">Scopes: public_repo, read:user</p>
        </div>
        <div class="flex items-center space-x-3">
          <button type="submit" class="px-4 py-2 rounded btn-accent">Save</button>
          <span id="authMsg" class="text-sm"></span>
        </div>
      </form>
    </section>

    <!-- Rate Limit -->
    <section class="p-6 rounded-lg" style="background:var(--card)">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold">Rate Limit</h2>
        <button id="refreshRate" class="px-3 py-1 rounded border border-gray-700 text-xs hover:border-accent">Refresh</button>
      </div>
      <div class="space-y-3 text-sm">
        <div>
          <div class="flex justify-between mb-1">
            <span>Core</span>
            <span id="coreText">0 / 60</span>
          </div>
          <div class="w-full bg-gray-700 rounded">
            <div id="coreBar" class="bar bar-green" style="width:0%"></div>
          </div>
        </div>
        <div>
          <div class="flex justify-between mb-1">
            <span>Search</span>
            <span id="searchText">0 / 10</span>
          </div>
          <div class="w-full bg-gray-700 rounded">
            <div id="searchBar" class="bar bar-yellow" style="width:0%"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Snippet Generator -->
    <section class="p-6 rounded-lg" style="background:var(--card)">
      <h2 class="text-xl font-bold mb-4">Snippet Generator</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm mb-1">Repo URL</label>
          <input id="repoUrl" type="text" placeholder="https://github.com/user/repo" class="w-full px-3 py-2 rounded input-dark">
        </div>
        <div>
          <label class="block text-sm mb-1">Tags (comma separated)</label>
          <input id="repoTags" type="text" placeholder="react,typescript" class="w-full px-3 py-2 rounded input-dark">
        </div>
        <div class="p-3 rounded border border-gray-700 text-sm">
          <div class="mb-2">Preview:</div>
          <img id="badgePreview" src="https://raw.githubusercontent.com/Tryboy869/gitsearch/main/assets/badges/badge-indexed.svg" alt="badge" class="mb-2">
          <textarea id="snippetCode" readonly class="w-full px-3 py-2 rounded input-dark text-xs" rows="3"></textarea>
        </div>
        <button id="copySnippet" class="px-4 py-2 rounded btn-accent">Copy</button>
        <span id="copyMsg" class="text-sm ml-2"></span>
      </div>
    </section>

    <!-- Preferences -->
    <section class="p-6 rounded-lg" style="background:var(--card)">
      <h2 class="text-xl font-bold mb-4">Preferences</h2>
      <div class="space-y-3 text-sm">
        <label class="flex items-center justify-between">
          <span>Dark theme</span>
          <input id="prefDark" type="checkbox" class="w-4 h-4 accent-accent">
        </label>
        <label class="flex items-center justify-between">
          <span>Save search history</span>
          <input id="prefHistory" type="checkbox" class="w-4 h-4 accent-accent">
        </label>
        <label class="flex items-center justify-between">
          <span>Compact cards</span>
          <input id="prefCompact" type="checkbox" class="w-4 h-4 accent-accent">
        </label>
      </div>
    </section>

    <!-- Danger Zone -->
    <section class="p-6 rounded-lg danger-zone">
      <h2 class="text-xl font-bold mb-4" style="color:#fca5a5">Danger Zone</h2>
      <div class="flex flex-wrap gap-3">
        <button id="clearHistory" class="px-4 py-2 rounded border border-red-700 text-sm hover:bg-red-900">Clear History</button>
        <button id="resetAll" class="px-4 py-2 rounded border border-red-700 text-sm hover:bg-red-900">Reset All</button>
      </div>
    </section>
  </main>

  <script>
    const DB_NAME = 'gitsearch_v1';
    const CONFIG_KEY = 'config';

    async function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains('config')) {
            db.createObjectStore('config', { keyPath: 'key' });
          }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function getConfig(key) {
      const db = await openDB();
      const tx = db.transaction('config', 'readonly');
      const store = tx.objectStore('config');
      const req = store.get(key);
      return new Promise((resolve, reject) => {
        req.onsuccess = () => resolve(req.result || { key, value: null });
        req.onerror = () => reject(req.error);
      });
    }

    async function setConfig(key, value) {
      const db = await openDB();
      const tx = db.transaction('config', 'readwrite');
      const store = tx.objectStore('config');
      store.put({ key, value });
      return tx.complete;
    }

    async function loadAuth() {
      const user = await getConfig('gh_user');
      const token = await getConfig('gh_token');
      if (user.value) document.getElementById('username').value = user.value;
      if (token.value) document.getElementById('token').value = token.value;
    }

    async function saveAuth(username, token) {
      await setConfig('gh_user', username);
      await setConfig('gh_token', token);
    }

    async function validateToken(token) {
      const headers = { Accept: 'application/vnd.github+json' };
      if (token) headers.Authorization = `Bearer ${token}`;
      const res = await fetch('https://api.github.com/user', { headers });
      return res.ok;
    }

    async function loadRate() {
      const token = (await getConfig('gh_token')).value;
      const headers = { Accept: 'application/vnd.github+json' };
      if (token) headers.Authorization = `Bearer ${token}`;
      const res = await fetch('https://api.github.com/rate_limit', { headers });
      const data = await res.json();
      const core = data.resources.core;
      const search = data.resources.search;
      const corePct = Math.round((core.used / core.limit) * 100);
      const searchPct = Math.round((search.used / search.limit) * 100);
      document.getElementById('coreText').textContent = `${core.used} / ${core.limit}`;
      document.getElementById('coreBar').style.width = `${corePct}%`;
      document.getElementById('searchText').textContent = `${search.used} / ${search.limit}`;
      document.getElementById('searchBar').style.width = `${searchPct}%`;
    }

    async function loadPrefs() {
      const prefs = await getConfig('prefs');
      const p = prefs.value || { dark: true, saveHistory: true, compactCards: false };
      document.getElementById('prefDark').checked = p.dark;
      document.getElementById('prefHistory').checked = p.saveHistory;
      document.getElementById('prefCompact').checked = p.compactCards;
    }

    async function savePrefs() {
      const p = {
        dark: document.getElementById('prefDark').checked,
        saveHistory: document.getElementById('prefHistory').checked,
        compactCards: document.getElementById('prefCompact').checked
      };
      await setConfig('prefs', p);
    }

    function buildSnippet() {
      const url = document.getElementById('repoUrl').value.trim();
      const tags = document.getElementById('repoTags').value.trim();
      if (!url) return;
      const u = new URL(url.replace(/\/$/, ''));
      const parts = u.pathname.split('/').filter(Boolean);
      const user = parts[0];
      const repo = parts[1];
      const tagQuery = tags ? `?tags=${encodeURIComponent(tags)}` : '';
      const badgeUrl = `https://raw.githubusercontent.com/Tryboy869/gitsearch/main/assets/badges/badge-indexed.svg`;
      const comment = `<!-- GitSearch badge for ${user}/${repo} -->`;
      const md = `[![GitSearch](${badgeUrl})](https://gitsearch.example.com/${user}/${repo}${tagQuery})`;
      document.getElementById('snippetCode').value = `${comment}\n${md}`;
    }

    async function copySnippet() {
      const code = document.getElementById('snippetCode').value;
      const msg = document.getElementById('copyMsg');
      try {
        await navigator.clipboard.writeText(code);
        msg.textContent = 'Copied!';
        msg.style.color = '#10b981';
      } catch (e) {
        const ta = document.getElementById('snippetCode');
        ta.select();
        document.execCommand('copy');
        msg.textContent = 'Copied!';
        msg.style.color = '#10b981';
      }
      setTimeout(() => msg.textContent = '', 2000);
    }

    document.getElementById('authForm').addEventListener('submit', async e => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const token = document.getElementById('token').value.trim();
      const msg = document.getElementById('authMsg');
      const ok = await validateToken(token);
      if (!ok) {
        msg.textContent = 'Invalid token';
        msg.style.color = '#ef4444';
        return;
      }
      await saveAuth(username, token);
      msg.textContent = 'Saved';
      msg.style.color = '#10b981';
      setTimeout(() => msg.textContent = '', 2000);
    });

    document.getElementById('toggleToken').addEventListener('click', () => {
      const i = document.getElementById('token');
      i.type = i.type === 'password' ? 'text' : 'password';
      document.getElementById('toggleToken').textContent = i.type === 'password' ? 'Show' : 'Hide';
    });

    document.getElementById('refreshRate').addEventListener('click', loadRate);

    document.getElementById('repoUrl').addEventListener('input', buildSnippet);
    document.getElementById('repoTags').addEventListener('input', buildSnippet);
    document.getElementById('copySnippet').addEventListener('click', copySnippet);

    document.getElementById('prefDark').addEventListener('change', savePrefs);
    document.getElementById('prefHistory').addEventListener('change', savePrefs);
    document.getElementById('prefCompact').addEventListener('change', savePrefs);

    document.getElementById('clearHistory').addEventListener('click', async () => {
      if (!confirm('Clear all search history?')) return;
      const db = await openDB();
      const tx = db.transaction('history', 'readwrite');
      const store = tx.objectStore('history');
      store.clear();
      await tx.complete;
      alert('History cleared');
    });

    document.getElementById('resetAll').addEventListener('click', async () => {
      if (!confirm('Reset all settings and data?')) return;
      const db = await openDB();
      const tx = db.transaction(['config', 'history', 'viewed'], 'readwrite');
      tx.objectStore('config').clear();
      tx.objectStore('history').clear();
      tx.objectStore('viewed').clear();
      await tx.complete;
      location.reload();
    });

    (async () => {
      await loadAuth();
      await loadRate();
      await loadPrefs();
      buildSnippet();
    })();
  </script>
</body>
</html>
