name: Auto-Release from CHANGELOG
on:
  push:
    branches: [main]
    paths: ["CHANGELOG.md"]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: chmod +x scripts/release.sh
      - name: Detect and release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/release.sh
