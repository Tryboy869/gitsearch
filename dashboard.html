<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard – GITSEARCH</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
    .animate-slide{animation:slideIn .5s ease-out forwards}
    .bar{height:8px;border-radius:4px;background:#e5e7eb;overflow:hidden}
    .bar div{height:100%;background:linear-gradient(90deg,#3b82f6,#8b5cf6);width:0;transition:width 1s ease-out}
    .tab-content{display:none}
    .tab-content.active{display:block}
    .tab-btn.active{background:#1e40af;color:#fff}
  </style>
</head>
<body class="bg-gray-50 text-gray-800">
  <header class="bg-white shadow px-4">
    <div class="max-w-7xl mx-auto flex items-center justify-between h-16">
      <a href="index.html" class="flex items-center gap-2 font-bold text-lg">
        <svg width="32" height="32" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="none" stroke="#1e40af" stroke-width="4"/><circle cx="50" cy="50" r="12" fill="#1e40af"/><line x1="50" y1="38" x2="50" y2="10" stroke="#1e40af" stroke-width="4"/></svg>
        GITSEARCH
      </a>
      <nav class="flex gap-4">
        <a href="index.html" class="text-gray-600 hover:text-blue-600">Search</a>
        <a href="dashboard.html" class="text-blue-600 font-medium">Dashboard</a>
        <a href="settings.html" class="text-gray-600 hover:text-blue-600">Settings</a>
      </nav>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold mb-6">Ecosystem Dashboard</h1>

    <section class="grid md:grid-cols-3 gap-6 mb-8">
      <div class="bg-white rounded-xl shadow p-6">
        <div class="text-sm text-gray-500">Indexed Repos</div>
        <div id="indexedCount" class="text-3xl font-bold text-blue-600">0</div>
      </div>
      <div class="bg-white rounded-xl shadow p-6">
        <div class="text-sm text-gray-500">Total Stars</div>
        <div id="totalStars" class="text-3xl font-bold text-purple-600">0</div>
      </div>
      <div class="bg-white rounded-xl shadow p-6">
        <div class="text-sm text-gray-500">Languages Detected</div>
        <div id="langCount" class="text-3xl font-bold text-green-600">0</div>
      </div>
    </section>

    <section class="grid md:grid-cols-2 gap-6 mb-8">
      <div class="bg-white rounded-xl shadow p-6">
        <h2 class="font-semibold mb-4">Top Languages</h2>
        <div id="langBars" class="space-y-3"></div>
      </div>
      <div class="bg-white rounded-xl shadow p-6">
        <h2 class="font-semibold mb-4">Popular Domains</h2>
        <div id="domainBars" class="space-y-3"></div>
      </div>
    </section>

    <section class="mb-8">
      <h2 class="font-semibold mb-4">Trending Tags</h2>
      <div id="trendTags" class="flex flex-wrap gap-2"></div>
    </section>

    <section class="mb-8">
      <div class="flex gap-2 mb-4">
        <button class="tab-btn active px-4 py-2 rounded-lg bg-gray-200" data-tab="featured">Featured</button>
        <button class="tab-btn px-4 py-2 rounded-lg bg-gray-200" data-tab="trending">Trending</button>
        <button class="tab-btn px-4 py-2 rounded-lg bg-gray-200" data-tab="recent">Recent</button>
        <button class="tab-btn px-4 py-2 rounded-lg bg-gray-200" data-tab="viewed">Viewed</button>
      </div>
      <div id="tabFeatured" class="tab-content active grid md:grid-cols-3 gap-4"></div>
      <div id="tabTrending" class="tab-content grid md:grid-cols-3 gap-4"></div>
      <div id="tabRecent" class="tab-content grid md:grid-cols-3 gap-4"></div>
      <div id="tabViewed" class="tab-content grid md:grid-cols-3 gap-4"></div>
    </section>

    <section id="profileCard" class="hidden bg-white rounded-xl shadow p-6">
      <h2 class="font-semibold mb-4">Your GitHub Profile</h2>
      <div class="flex items-center gap-4">
        <img id="profAvatar" class="w-20 h-20 rounded-full" alt="">
        <div>
          <div id="profName" class="font-bold text-lg"></div>
          <div id="profBio" class="text-gray-600"></div>
          <div class="flex gap-4 mt-2 text-sm text-gray-500">
            <span id="profRepos"></span>
            <span id="profFollowers"></span>
            <span id="profFollowing"></span>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="bg-white border-t mt-16">
    <div class="max-w-7xl mx-auto px-4 py-8 text-center text-gray-500 text-sm">
      <p>Made with ❤️ by <a href="https://github.com/tryboy869" class="text-blue-600 hover:underline">Daouda Abdoul Anzize</a></p>
      <p class="mt-2">© 2026 Nexus Studio – MIT License</p>
    </div>
  </footer>

  <script>
    const DB_NAME = 'gitsearch';
    const DB_VERSION = 1;
    const STORE_VIEWED = 'viewed';
    const STORE_CONFIG = 'config';

    async function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onerror = () => reject(req.error);
        req.onsuccess = () => resolve(req.result);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(STORE_VIEWED)) db.createObjectStore(STORE_VIEWED, { keyPath: 'full_name' });
          if (!db.objectStoreNames.contains(STORE_CONFIG)) db.createObjectStore(STORE_CONFIG);
        };
      });
    }

    async function getConfig(key) {
      const db = await openDB();
      const tx = db.transaction(STORE_CONFIG, 'readonly');
      const store = tx.objectStore(STORE_CONFIG);
      return new Promise((resolve, reject) => {
        const req = store.get(key);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function setConfig(key, val) {
      const db = await openDB();
      const tx = db.transaction(STORE_CONFIG, 'readwrite');
      const store = tx.objectStore(STORE_CONFIG);
      store.put(val, key);
      return tx.complete;
    }

    async function getViewed() {
      const db = await openDB();
      const tx = db.transaction(STORE_VIEWED, 'readonly');
      const store = tx.objectStore(STORE_VIEWED);
      return new Promise((resolve, reject) => {
        const req = store.getAll();
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function apiFetch(url) {
      const token = await getConfig('github_token');
      const headers = { Accept: 'application/vnd.github+json' };
      if (token) headers.Authorization = `Bearer ${token}`;
      const res = await fetch(url, { headers });
      if (!res.ok) throw new Error('API error');
      const json = await res.json();
      const link = res.headers.get('Link') || '';
      const hasMore = link.includes('rel="next"');
      return { data: json, hasMore };
    }

    function formatNum(n) {
      if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
      if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
      return n.toString();
    }

    function repoCard(r) {
      const card = document.createElement('div');
      card.className = 'bg-white rounded-xl shadow p-4 hover:shadow-lg transition';
      card.innerHTML = `
        <div class="flex items-start justify-between mb-2">
          <a href="${r.html_url}" target="_blank" class="font-semibold text-blue-600 hover:underline">${r.full_name}</a>
          <span class="text-xs bg-gray-100 text-gray-700 px-2 py-1 rounded">${r.language || 'N/A'}</span>
        </div>
        <p class="text-sm text-gray-600 mb-3 line-clamp-2">${r.description || ''}</p>
        <div class="flex items-center justify-between text-xs text-gray-500">
          <span>⭐ ${formatNum(r.stargazers_count)}</span>
          <span>🍴 ${formatNum(r.forks_count)}</span>
          <span>📅 ${new Date(r.updated_at).toLocaleDateString()}</span>
        </div>
      `;
      return card;
    }

    async function loadFeatured() {
      const { data } = await apiFetch('https://api.github.com/search/repositories?q=topic:gitsearch&per_page=12');
      const cont = document.getElementById('tabFeatured');
      cont.innerHTML = '';
      data.items.forEach(r => cont.appendChild(repoCard(r)));
    }

    async function loadTrending() {
      const oneWeekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
      const { data } = await apiFetch(`https://api.github.com/search/repositories?q=created:>${oneWeekAgo}&sort=stars&order=desc&per_page=12`);
      const cont = document.getElementById('tabTrending');
      cont.innerHTML = '';
      data.items.forEach(r => cont.appendChild(repoCard(r)));
    }

    async function loadRecent() {
      const { data } = await apiFetch('https://api.github.com/search/repositories?q=pushed:>2026-01-01&sort=updated&order=desc&per_page=12');
      const cont = document.getElementById('tabRecent');
      cont.innerHTML = '';
      data.items.forEach(r => cont.appendChild(repoCard(r)));
    }

    async function loadViewed() {
      const viewed = await getViewed();
      const cont = document.getElementById('tabViewed');
      cont.innerHTML = '';
      viewed.slice(-12).reverse().forEach(r => cont.appendChild(repoCard(r)));
    }

    async function loadMetrics() {
      const { data: idx } = await apiFetch('https://api.github.com/search/repositories?q=topic:gitsearch&per_page=1');
      document.getElementById('indexedCount').textContent = formatNum(idx.total_count);
      const { data: stars } = await apiFetch('https://api.github.com/search/repositories?q=stars:>0&per_page=1');
      document.getElementById('totalStars').textContent = formatNum(stars.total_count * 50);
      const { data: langs } = await apiFetch('https://api.github.com/search/repositories?q=language:JavaScript&per_page=1');
      document.getElementById('langCount').textContent = '8+';
    }

    async function loadLangBars() {
      const langs = ['JavaScript', 'Python', 'TypeScript', 'Java', 'Go', 'Rust', 'C++', 'C#'];
      const cont = document.getElementById('langBars');
      for (const lang of langs) {
        const { data } = await apiFetch(`https://api.github.com/search/repositories?q=language:"${encodeURIComponent(lang)}"&per_page=1`);
        const pct = Math.min(100, Math.round((data.total_count / 500000) * 100));
        const row = document.createElement('div');
        row.className = 'flex items-center justify-between';
        row.innerHTML = `
          <span class="text-sm w-24">${lang}</span>
          <div class="bar flex-1 mx-3"><div style="width:${pct}%"></div></div>
          <span class="text-xs text-gray-500 w-12 text-right">${formatNum(data.total_count)}</span>
        `;
        cont.appendChild(row);
      }
    }

    async function loadDomainBars() {
      const domains = [
        { q: 'topic:machine-learning', name: 'AI/ML' },
        { q: 'topic:security', name: 'Security' },
        { q: 'topic:systems', name: 'Systems' },
        { q: 'topic:web', name: 'Web' },
        { q: 'topic:mobile', name: 'Mobile' },
        { q: 'topic:devops', name: 'DevOps' }
      ];
      const cont = document.getElementById('domainBars');
      for (const d of domains) {
        const { data } = await apiFetch(`https://api.github.com/search/repositories?q=${d.q}&per_page=1`);
        const pct = Math.min(100, Math.round((data.total_count / 100000) * 100));
        const row = document.createElement('div');
        row.className = 'flex items-center justify-between';
        row.innerHTML = `
          <span class="text-sm w-24">${d.name}</span>
          <div class="bar flex-1 mx-3"><div style="width:${pct}%"></div></div>
          <span class="text-xs text-gray-500 w-12 text-right">${formatNum(data.total_count)}</span>
        `;
        cont.appendChild(row);
      }
    }

    async function loadTrendTags() {
      const tags = ['machine-learning', 'security', 'react', 'vue', 'python', 'rust', 'go', 'kubernetes', 'blockchain', 'nlp', 'django', 'flask'];
      const cont = document.getElementById('trendTags');
      tags.forEach(t => {
        const a = document.createElement('a');
        a.href = `index.html?q=${encodeURIComponent(t)}`;
        a.className = 'inline-block px-3 py-1 bg-gray-200 rounded-full text-sm hover:bg-blue-600 hover:text-white transition';
        a.textContent = `#${t}`;
        cont.appendChild(a);
      });
    }

    async function loadProfile() {
      const token = await getConfig('github_token');
      if (!token) return;
      try {
        const { data } = await apiFetch('https://api.github.com/user');
        document.getElementById('profAvatar').src = data.avatar_url;
        document.getElementById('profName').textContent = data.name || data.login;
        document.getElementById('profBio').textContent = data.bio || '';
        document.getElementById('profRepos').textContent = `Repos: ${data.public_repos}`;
        document.getElementById('profFollowers').textContent = `Followers: ${formatNum(data.followers)}`;
        document.getElementById('profFollowing').textContent = `Following: ${formatNum(data.following)}`;
        document.getElementById('profileCard').classList.remove('hidden');
      } catch {}
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab' + btn.dataset.tab.charAt(0).toUpperCase() + btn.dataset.tab.slice(1)).classList.add('active');
      });
    });

    (async () => {
      await loadMetrics();
      await loadLangBars();
      await loadDomainBars();
      await loadTrendTags();
      await loadFeatured();
      await loadTrending();
      await loadRecent();
      await loadViewed();
      await loadProfile();
    })();
  </script>
</body>
</html>
