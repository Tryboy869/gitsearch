<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GITSEARCH - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e1a;
            --card: #0d1220;
            --accent: #7b2cbf;
            --cyan: #00d4ff;
            --text: #f1f5f9;
        }
        body {
            background: var(--bg);
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <header class="sticky top-0 bg-card py-2 flex justify-between items-center">
        <img src="assets/logo.svg" alt="GITSEARCH" class="h-10">
        <nav>
            <ul class="flex items-center">
                <li class="mr-4">
                    <a href="#" class="text-accent">Dashboard</a>
                </li>
                <li class="mr-4">
                    <a href="index.html" class="text-text">Recherche</a>
                </li>
                <li>
                    <a href="settings.html" class="text-text">Paramètres</a>
                </li>
            </ul>
        </nav>
    </header>
    <main class="container mx-auto p-4 pt-6 md:p-6 lg:p-12 xl:p-24">
        <section class="flex flex-wrap justify-center mb-4">
            <button class="bg-accent hover:bg-accent-dark text-text font-bold py-2 px-4 rounded mr-4 mb-4">Featured</button>
            <button class="bg-accent hover:bg-accent-dark text-text font-bold py-2 px-4 rounded mr-4 mb-4">Trending</button>
            <button class="bg-accent hover:bg-accent-dark text-text font-bold py-2 px-4 rounded mr-4 mb-4">Recent</button>
            <button class="bg-accent hover:bg-accent-dark text-text font-bold py-2 px-4 rounded mb-4">Viewed</button>
        </section>
        <section id="featured" class="mb-4">
            <h2 class="text-2xl text-accent mb-2">Featured</h2>
            <ul id="featured-list" class="list-none mb-4"></ul>
            <p id="featured-count" class="text-text"></p>
        </section>
        <section id="trending" class="mb-4">
            <h2 class="text-2xl text-accent mb-2">Trending</h2>
            <ul id="trending-list" class="list-none mb-4"></ul>
        </section>
        <section id="recent" class="mb-4">
            <h2 class="text-2xl text-accent mb-2">Recent</h2>
            <ul id="recent-list" class="list-none mb-4"></ul>
        </section>
        <section id="viewed" class="mb-4">
            <h2 class="text-2xl text-accent mb-2">Viewed</h2>
            <ul id="viewed-list" class="list-none mb-4"></ul>
        </section>
        <section id="metrics" class="mb-4">
            <h2 class="text-2xl text-accent mb-2">Métriques</h2>
            <p id="repos-indexed" class="text-text"></p>
            <p id="total-stars" class="text-text"></p>
            <div id="top-languages" class="mb-4"></div>
            <div id="popular-domains" class="mb-4"></div>
        </section>
        <section id="profile" class="mb-4">
            <h2 class="text-2xl text-accent mb-2">Profil GitHub</h2>
            <img id="profile-avatar" src="" alt="Avatar" class="h-10 w-10 rounded-full mb-2">
            <p id="profile-bio" class="text-text"></p>
            <p id="profile-repos" class="text-text"></p>
            <p id="profile-followers" class="text-text"></p>
        </section>
        <section id="trending-tags" class="mb-4">
            <h2 class="text-2xl text-accent mb-2">Tags tendance</h2>
            <ul id="trending-tags-list" class="list-none flex flex-wrap justify-center mb-4"></ul>
        </section>
    </main>
    <script>
        // Ouvrir la base de données
        let db;
        async function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('gitsearch_v1', 1);
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    db.createObjectStore('searches', { keyPath: 'id' });
                    db.createObjectStore('viewed', { keyPath: 'id' });
                    db.createObjectStore('config', { keyPath: 'id' });
                };
                request.onsuccess = (event) => {
                    db = event.target.result;
                    resolve(db);
                };
                request.onerror = (event) => {
                    reject(event);
                };
            });
        }

        // Charger les données
        async function loadFeatured() {
            const response = await fetch('https://api.github.com/search/repositories?q=topic:gitsearch');
            const data = await response.json();
            const list = document.getElementById('featured-list');
            list.innerHTML = '';
            data.items.forEach((item) => {
                const li = document.createElement('li');
                li.textContent = item.full_name;
                list.appendChild(li);
            });
            document.getElementById('featured-count').textContent = `Nombre de dépôts : ${data.total_count}`;
        }

        async function loadTrending() {
            const response = await fetch('https://api.github.com/search/repositories?q=created:>2022-01-01&sort=stars&order=desc');
            const data = await response.json();
            const list = document.getElementById('trending-list');
            list.innerHTML = '';
            data.items.forEach((item) => {
                const li = document.createElement('li');
                li.textContent = item.full_name;
                list.appendChild(li);
            });
        }

        async function loadRecent() {
            const response = await fetch('https://api.github.com/search/repositories?q=updated:>2022-01-01&sort=updated&order=desc');
            const data = await response.json();
            const list = document.getElementById('recent-list');
            list.innerHTML = '';
            data.items.forEach((item) => {
                const li = document.createElement('li');
                li.textContent = item.full_name;
                list.appendChild(li);
            });
        }

        async function loadViewed() {
            const transaction = db.transaction('viewed', 'readonly');
            const store = transaction.objectStore('viewed');
            const request = store.getAll();
            request.onsuccess = (event) => {
                const list = document.getElementById('viewed-list');
                list.innerHTML = '';
                event.target.result.forEach((item) => {
                    const li = document.createElement('li');
                    li.textContent = item.full_name;
                    list.appendChild(li);
                });
            };
        }

        async function loadMetrics() {
            const response = await fetch('https://api.github.com/search/repositories?q=topic:gitsearch');
            const data = await response.json();
            document.getElementById('repos-indexed').textContent = `Nombre de dépôts indexés : ${data.total_count}`;
            const totalStars = data.items.reduce((acc, item) => acc + item.stargazers_count, 0);
            document.getElementById('total-stars').textContent = `Nombre total d'étoiles : ${totalStars}`;
            const topLanguages = data.items.reduce((acc, item) => {
                if (!acc[item.language]) {
                    acc[item.language] = 0;
                }
                acc[item.language]++;
                return acc;
            }, {});
            const topLanguagesList = document.getElementById('top-languages');
            topLanguagesList.innerHTML = '';
            Object.keys(topLanguages).forEach((language) => {
                const div = document.createElement('div');
                div.textContent = `${language} : ${topLanguages[language]}`;
                topLanguagesList.appendChild(div);
            });
            const popularDomains = data.items.reduce((acc, item) => {
                if (!acc[item.owner.login]) {
                    acc[item.owner.login] = 0;
                }
                acc[item.owner.login]++;
                return acc;
            }, {});
            const popularDomainsList = document.getElementById('popular-domains');
            popularDomainsList.innerHTML = '';
            Object.keys(popularDomains).forEach((domain) => {
                const div = document.createElement('div');
                div.textContent = `${domain} : ${popularDomains[domain]}`;
                popularDomainsList.appendChild(div);
            });
        }

        async function loadProfile() {
            const transaction = db.transaction('config', 'readonly');
            const store = transaction.objectStore('config');
            const request = store.get(1);
            request.onsuccess = (event) => {
                const token = event.target.result.token;
                if (token) {
                    fetch('https://api.github.com/user', {
                        headers: {
                            Authorization: `Bearer ${token}`,
                        },
                    })
                    .then((response) => response.json())
                    .then((data) => {
                        document.getElementById('profile-avatar').src = data.avatar_url;
                        document.getElementById('profile-bio').textContent = data.bio;
                        document.getElementById('profile-repos').textContent = `Nombre de dépôts : ${data.public_repos}`;
                        document.getElementById('profile-followers').textContent = `Nombre d'abonnés : ${data.followers}`;
                    });
                }
            };
        }

        async function loadTrendingTags() {
            const response = await fetch('https://api.github.com/search/repositories?q=topic:gitsearch');
            const data = await response.json();
            const list = document.getElementById('trending-tags-list');
            list.innerHTML = '';
            data.items.forEach((item) => {
                const li = document.createElement('li');
                li.textContent = item.full_name;
                li.addEventListener('click', () => {
                    window.location.href = `index.html?q=${item.full_name}`;
                });
                list.appendChild(li);
            });
        }

        // Charger les données au démarrage
        openDB().then((db) => {
            loadFeatured();
            loadTrending();
            loadRecent();
            loadViewed();
            loadMetrics();
            loadProfile();
            loadTrendingTags();
        });
    </script>
</body>
</html>
