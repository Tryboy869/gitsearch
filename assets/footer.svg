<svg viewBox="0 0 900 70" width="900" height="70" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="0">
      <stop offset="0%" stop-color="#0a0e1a">
        <animate attributeName="stop-color" values="#0a0e1a;#0d1220;#0a0e1a" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0d1220">
        <animate attributeName="stop-color" values="#0d1220;#0a0e1a;#0d1220" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="70">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="900" height="70" fill="url(#bg)"/>
  <rect width="900" height="2" fill="url(#scan)" opacity="0.4">
    <animateTransform attributeName="transform" type="translate" from="0 -70" to="0 70" dur="4s" repeatCount="indefinite"/>
  </rect>
  <g font-family="monospace" font-size="12" fill="#9ca3af">
    <text x="450" y="40" text-anchor="middle">🔍 GITSEARCH  ·  Built by Nexus Studio  ·  Cotonou, Bénin  ·  2026</text>
  </g>
  <g font-family="monospace" font-size="10" fill="#00d4ff" opacity="0.6">
    <text x="100" y="25">
      <animate attributeName="y" values="25;5;25" dur="6s" repeatCount="indefinite"/>
      &lt;search/&gt;
    </text>
    <text x="200" y="45">
      <animate attributeName="y" values="45;25;45" dur="7s" repeatCount="indefinite"/>
      semantic()
    </text>
    <text x="700" y="30">
      <animate attributeName="y" values="30;10;30" dur="5s" repeatCount="indefinite"/>
      index[]
    </text>
    <text x="800" y="50">
      <animate attributeName="y" values="50;30;50" dur="8s" repeatCount="indefinite"/>
      query{}
    </text>
  </g>
  <circle cx="50" cy="35" r="4" fill="#7b2cbf" filter="url(#glow)">
    <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="850" cy="35" r="4" fill="#7b2cbf" filter="url(#glow)">
    <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>