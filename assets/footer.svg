<svg viewBox="0 0 900 70" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GITSEARCH footer animation">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1220"/>
      <animate attributeName="y1" values="0;1;0" dur="12s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @media (prefers-reduced-motion: reduce) {
        svg * { animation: none !important; }
      }
      text { font-family: "Courier New", monospace; }
    </style>
  </defs>

  <rect width="900" height="70" fill="url(#bgGrad)"/>

  <!-- Particules flottantes -->
  <text x="80" y="25" fill="#00d4ff" font-size="12">
    &lt;search/&gt;
    <animate attributeName="y" values="25;20;25" dur="4s" repeatCount="indefinite"/>
  </text>

  <text x="200" y="45" fill="#7b2cbf" font-size="12">
    semantic()
    <animate attributeName="y" values="45;40;45" dur="5s" begin="0.5s" repeatCount="indefinite"/>
  </text>

  <text x="600" y="30" fill="#00d4ff" font-size="12">
    index[]
    <animate attributeName="y" values="30;25;30" dur="4.5s" begin="1s" repeatCount="indefinite"/>
  </text>

  <text x="720" y="50" fill="#7b2cbf" font-size="12">
    query{}
    <animate attributeName="y" values="50;45;50" dur="3.8s" begin="1.5s" repeatCount="indefinite"/>
  </text>

  <!-- Texte central -->
  <text x="450" y="40" text-anchor="middle" fill="#f1f5f9" font-size="14">
    🔍 GITSEARCH · Built by Nexus Studio · Cotonou, Bénin · 2026
  </text>

  <!-- Dots pulsants -->
  <circle cx="50" cy="35" r="4" fill="#7b2cbf" filter="url(#glow)">
    <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
  </circle>

  <circle cx="850" cy="35" r="4" fill="#7b2cbf" filter="url(#glow)">
    <animate attributeName="r" values="4;6;4" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>

  <!-- Ligne scan -->
  <line x1="0" y1="35" x2="900" y2="35" stroke="#00d4ff" stroke-width="0.5" opacity="0.3">
    <animate attributeName="x1" values="0;900;0" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="0;900;0" dur="8s" repeatCount="indefinite"/>
  </line>
</svg>