<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 70" width="900" height="70" role="img" aria-labelledby="footer-title">
  <title id="footer-title">GITSEARCH Footer</title>
  <style>@media (prefers-reduced-motion: reduce) { * { animation: none !important; } }</style>
  <defs>
    <linearGradient id="ftBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="50%" stop-color="#0f0a1e">
        <animate attributeName="stop-color" values="#0f0a1e;#1a0a2e;#0f0a1e" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="ftAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#7b2cbf"/>
      <stop offset="100%" stop-color="#ff006e"/>
    </linearGradient>
  </defs>
  <rect width="900" height="70" fill="url(#ftBg)" rx="8"/>
  <!-- Top border wave -->
  <rect width="900" height="2" fill="url(#ftAccent)" rx="1">
    <animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
  </rect>
  <!-- Floating code particles -->
  <text x="50" y="30" font-family="monospace" font-size="9" fill="#1a1a3e" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0" dur="4s" begin="0s" repeatCount="indefinite"/>
    <animateMotion dur="4s" begin="0s" repeatCount="indefinite" path="M0,0 L0,-15"/>
    &lt;search/&gt;
  </text>
  <text x="800" y="50" font-family="monospace" font-size="9" fill="#1a1a3e" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0" dur="5s" begin="1s" repeatCount="indefinite"/>
    <animateMotion dur="5s" begin="1s" repeatCount="indefinite" path="M0,0 L0,-15"/>
    semantic()
  </text>
  <text x="400" y="55" font-family="monospace" font-size="8" fill="#1a1a3e" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0" dur="3.5s" begin="2s" repeatCount="indefinite"/>
    <animateMotion dur="3.5s" begin="2s" repeatCount="indefinite" path="M0,0 L0,-12"/>
    index[]
  </text>
  <!-- Center content -->
  <text x="450" y="32" font-family="'Courier New', monospace" font-size="11" font-weight="700" fill="white" text-anchor="middle" letter-spacing="3">GITSEARCH</text>
  <text x="450" y="47" font-family="monospace" font-size="9" fill="#374151" text-anchor="middle">Semantic GitHub Search Engine — Built by Nexus Studio</text>
  <!-- Center dot -->
  <circle cx="450" cy="60" r="2.5" fill="#7b2cbf">
    <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2.5;4;2.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Left dots -->
  <circle cx="60" cy="35" r="1.5" fill="#00d4ff" opacity="0.4">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="35" r="1.5" fill="#7b2cbf" opacity="0.4">
    <animate attributeName="opacity" values="1;0.4;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Right dots -->
  <circle cx="820" cy="35" r="1.5" fill="#7b2cbf" opacity="0.4">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="840" cy="35" r="1.5" fill="#ff006e" opacity="0.4">
    <animate attributeName="opacity" values="1;0.4;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>
