<svg xmlns="http://www.w3.org/2000/svg" width="900" height="70" viewBox="0 0 900 70">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="0">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1220"/>
      <animate attributeName="x1" values="0;900;0" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="900;0;900" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <style>
      @media (prefers-reduced-motion:reduce){
        svg *{animation:none!important}
      }
      text{font-family:Courier New,monospace;font-size:14px;fill:#a0aec0}
    </style>
  </defs>
  <rect width="900" height="70" fill="url(#bg)"/>
  <g>
    <circle cx="80" cy="35" r="2" fill="#7b2cbf"/>
    <animate attributeName="y" values="35;50;35" dur="4s" repeatCount="indefinite"/>
  </g>
  <g>
    <circle cx="220" cy="35" r="2" fill="#7b2cbf"/>
    <animate attributeName="y" values="35;20;35" dur="5s" repeatCount="indefinite"/>
  </g>
  <g>
    <circle cx="680" cy="35" r="2" fill="#7b2cbf"/>
    <animate attributeName="y" values="35;48;35" dur="6s" repeatCount="indefinite"/>
  </g>
  <g>
    <circle cx="820" cy="35" r="2" fill="#7b2cbf"/>
    <animate attributeName="y" values="35;22;35" dur="7s" repeatCount="indefinite"/>
  </g>
  <text x="450" y="40" text-anchor="middle">🔍 GITSEARCH · Built by Nexus Studio · Cotonou, Bénin · 2026</text>
  <circle cx="200" cy="55" r="2" fill="#7b2cbf">
    <animate attributeName="r" values="2;4;2" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="55" r="2" fill="#7b2cbf">
    <animate attributeName="r" values="2;4;2" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <line x1="0" y1="10" x2="0" y2="10" stroke="#7b2cbf" stroke-width="1">
    <animate attributeName="x1" values="0;900" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="0;900" dur="3s" repeatCount="indefinite"/>
  </line>
</svg>