    <text x="55" y="18" font-family="Courier New" font-size="12" fill="#00d4ff">nlp</text>
    <text x="90" y="18" font-family="Courier New" font-size="12" fill="#7b2cbf">·</text>
    <text x="100" y="18" font-family="Courier New" font-size="12" fill="#00d4ff">python</text>
    <text x="155" y="18" font-family="Courier New" font-size="12" fill="#7b2cbf">·</text>
