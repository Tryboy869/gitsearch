<svg viewBox="0 0 340 28" width="340" height="28" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="badge tags">
  <title>badge tags</title>
  <defs>
    <clipPath id="typeClip">
      <rect x="0" y="0" width="0" height="28">
        <animate attributeName="width" values="0;340" dur="1.2s" fill="freeze"/>
      </rect>
    </clipPath>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="340" height="28" rx="4" fill="#0d1220"/>
  <g clip-path="url(#typeClip)">
    <text x="10" y="18" fill="#00d4ff" font-family="Courier New, monospace" font-size="14">🏷</text>
    <text x="30" y="18" fill="#00d4ff" font-family="Courier New, monospace" font-size="14">
      ml
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.3s" fill="freeze"/>
    </text>
    <text x="52" y="18" fill="#7b2cbf" font-family="Courier New, monospace" font-size="14">
      ·
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.5s" fill="freeze"/>
    </text>
    <text x="60" y="18" fill="#00d4ff" font-family="Courier New, monospace" font-size="14">
      nlp
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.6s" fill="freeze"/>
    </text>
    <text x="88" y="18" fill="#7b2cbf" font-family="Courier New, monospace" font-size="14">
      ·
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.8s" fill="freeze"/>
    </text>
    <text x="96" y="18" fill="#00d4ff" font-family="Courier New, monospace" font-size="14">
      python
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.9s" fill="freeze"/>
    </text>
    <text x="138" y="18" fill="#7b2cbf" font-family="Courier New, monospace" font-size="14">
      ·
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.1s" fill="freeze"/>
    </text>
    <text x="146" y="18" fill="#00d4ff" font-family="Courier New, monospace" font-size="14">
      oss
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.2s" fill="freeze"/>
    </text>
    <rect x="30" y="21" width="0" height="2" fill="#7b2cbf">
      <animate attributeName="width" values="0;136" dur="0.8s" begin="1.5s" fill="freeze"/>
    </rect>
  </g>
  <style>
    @media (prefers-reduced-motion: reduce) {
      animate { animation: none !important; }
    }
  </style>
</svg>