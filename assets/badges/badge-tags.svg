<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 28" width="340" height="28">
  <rect x="0" y="0" width="340" height="28" rx="4" fill="#0d1220"/>
  <text x="10" y="20" font-family="Courier New, monospace" font-size="16" fill="#f1f5f9">🏷</text>
  <g clip-path="url(#clip)">
    <text x="30" y="20" font-family="Courier New, monospace" font-size="16" fill="#00d4ff">
      <tspan>ml</tspan>
      <tspan x="60" y="20" fill="#7b2cbf">·</tspan>
      <tspan x="70" y="20" fill="#00d4ff">nlp</tspan>
      <tspan x="120" y="20" fill="#7b2cbf">·</tspan>
      <tspan x="130" y="20" fill="#00d4ff">python</tspan>
      <tspan x="190" y="20" fill="#7b2cbf">·</tspan>
      <tspan x="200" y="20" fill="#00d4ff">oss</tspan>
    </text>
  </g>
  <clipPath id="clip">
    <rect x="30" y="0" width="0" height="28" fill="#0d1220">
      <animate attributeName="width" from="0" to="280" begin="0s" dur="2s" fill="freeze"/>
    </rect>
  </clipPath>
  <rect x="30" y="24" width="0" height="2" fill="#00d4ff">
    <animate attributeName="x" from="30" to="310" begin="0s" dur="2s" fill="freeze"/>
    <animate attributeName="width" from="0" to="280" begin="0s" dur="2s" fill="freeze"/>
  </rect>
  <style>
    @keyframes underline {
      0% {
        stroke-dashoffset: 280;
      }
      100% {
        stroke-dashoffset: 0;
      }
    }
  </style>
  <path d="M 30 26 H 310" stroke="#00d4ff" stroke-width="2" stroke-dasharray="280" stroke-dashoffset="280">
    <animate attributeName="stroke-dashoffset" from="280" to="0" begin="0s" dur="2s" fill="freeze"/>
  </path>
  <style>
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.5s !important;
        transition-duration: 0.5s !important;
      }
    }
  </style>
</svg>