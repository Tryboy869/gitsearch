<svg viewBox="0 0 340 28" width="340" height="28" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tags: ml, nlp, python, oss">
  <rect width="340" height="28" fill="#0d1220" rx="4"/>
  
  <style>
    @media (prefers-reduced-motion: reduce) {
      svg * { animation: none !important; }
    }
  </style>
  
  <defs>
    <clipPath id="underline-clip">
      <rect x="10" y="22" width="0" height="2" rx="1">
        <animate attributeName="width" from="0" to="320" dur="1.2s" begin="0.9s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>
  
  <g font-family="ui-monospace, monospace" font-size="14" fill="#00d4ff">
    <g opacity="0" transform="translate(0, -5)">
      <text x="10" y="18">🏷 ml</text>
      <animate attributeName="opacity" to="1" dur="0.2s" begin="0s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" to="0,0" dur="0.3s" begin="0s" fill="freeze"/>
    </g>
    
    <g opacity="0" transform="translate(0, -5)">
      <text x="78" y="18" fill="#7b2cbf">·</text>
      <text x="88" y="18">nlp</text>
      <animate attributeName="opacity" to="1" dur="0.2s" begin="0.3s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" to="0,0" dur="0.3s" begin="0.3s" fill="freeze"/>
    </g>
    
    <g opacity="0" transform="translate(0, -5)">
      <text x="133" y="18" fill="#7b2cbf">·</text>
      <text x="143" y="18">python</text>
      <animate attributeName="opacity" to="1" dur="0.2s" begin="0.6s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" to="0,0" dur="0.3s" begin="0.6s" fill="freeze"/>
    </g>
    
    <g opacity="0" transform="translate(0, -5)">
      <text x="228" y="18" fill="#7b2cbf">·</text>
      <text x="238" y="18">oss</text>
      <animate attributeName="opacity" to="1" dur="0.2s" begin="0.9s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" to="0,0" dur="0.3s" begin="0.9s" fill="freeze"/>
    </g>
  </g>
  
  <rect x="10" y="22" width="320" height="2" fill="#00d4ff" opacity="0.3" clip-path="url(#underline-clip)"/>
</svg>