<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 28" width="340" height="28" role="img" aria-labelledby="badge-tags-title">
  <title id="badge-tags-title">GITSEARCH Tags</title>
  <style>@media (prefers-reduced-motion: reduce) { * { animation: none !important; } }</style>
  <defs>
    <linearGradient id="btBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#0a0a18"/>
    </linearGradient>
    <linearGradient id="btTag1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="btTag2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7b2cbf" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7b2cbf" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="btTag3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff006e" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ff006e" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="340" height="28" rx="6" fill="url(#btBg)"/>
  <!-- Tag icon -->
  <path d="M10,9 L10,17 L16,23 L22,17 L22,9 Z M14,13 A1.5,1.5 0 1,1 17,13 A1.5,1.5 0 0,1 14,13" fill="none" stroke="#7b2cbf" stroke-width="1.3">
    <animate attributeName="stroke" values="#7b2cbf;#00d4ff;#ff006e;#7b2cbf" dur="4s" repeatCount="indefinite"/>
  </path>
  <text x="28" y="12" font-family="monospace" font-size="7" fill="#4b5563" letter-spacing="2">TAGS</text>

  <!-- Tag 1 -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.2s" fill="freeze"/>
    <rect x="27" y="14" width="58" height="11" rx="3" fill="url(#btTag1)" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.5"/>
    <text x="56" y="23" font-family="monospace" font-size="8" fill="#00d4ff" text-anchor="middle">machine-learning</text>
  </g>
  <!-- Tag 2 -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.5s" fill="freeze"/>
    <rect x="90" y="14" width="32" height="11" rx="3" fill="url(#btTag2)" stroke="#7b2cbf" stroke-width="0.5" stroke-opacity="0.5"/>
    <text x="106" y="23" font-family="monospace" font-size="8" fill="#a78bfa" text-anchor="middle">python</text>
  </g>
  <!-- Tag 3 -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.8s" fill="freeze"/>
    <rect x="127" y="14" width="24" height="11" rx="3" fill="url(#btTag3)" stroke="#ff006e" stroke-width="0.5" stroke-opacity="0.5"/>
    <text x="139" y="23" font-family="monospace" font-size="8" fill="#ff6ea6" text-anchor="middle">nlp</text>
  </g>
  <!-- Tag 4 -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.1s" fill="freeze"/>
    <rect x="156" y="14" width="34" height="11" rx="3" fill="url(#btTag1)" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.5"/>
    <text x="173" y="23" font-family="monospace" font-size="8" fill="#00d4ff" text-anchor="middle">rust</text>
  </g>
  <!-- Tag 5 -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.4s" fill="freeze"/>
    <rect x="195" y="14" width="44" height="11" rx="3" fill="url(#btTag2)" stroke="#7b2cbf" stroke-width="0.5" stroke-opacity="0.5"/>
    <text x="217" y="23" font-family="monospace" font-size="8" fill="#a78bfa" text-anchor="middle">open-source</text>
  </g>
  <!-- Separator -->
  <line x1="245" y1="6" x2="245" y2="22" stroke="#1a1a2e" stroke-width="1"/>
  <!-- "Edit tags" hint -->
  <text x="252" y="17" font-family="monospace" font-size="7.5" fill="#2d2d4a">✏ customize</text>
  <!-- Scan underline -->
  <rect x="27" y="25" width="0" height="1.5" fill="#7b2cbf" rx="1" opacity="0.6">
    <animate attributeName="width" values="0;213;0" dur="3s" begin="1.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4,0,0.6,1;0.4,0,0.6,1"/>
  </rect>
</svg>
