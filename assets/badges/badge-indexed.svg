<svg width="210" height="28" viewBox="0 0 210 28" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7b2cbf"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>@media(prefers-reduced-motion:reduce){svg *{animation:none!important}}</style>

  <!-- Fond gauche -->
  <rect x="0" y="0" width="140" height="28" rx="4" fill="#1e293b"/>
  <!-- Fond droit -->
  <rect x="140" y="0" width="70" height="28" rx="4" fill="#7b2cbf"/>

  <!-- Loupe -->
  <g transform="translate(20 14)">
    <circle r="6" fill="none" stroke="url(#g)" stroke-width="2"/>
    <line x1="6" y1="6" x2="11" y2="11" stroke="url(#g)" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Scan line -->
  <line x1="0" y1="14" x2="140" y2="14" stroke="#00d4ff" stroke-width="1" opacity="0.6">
    <animateTransform attributeName="transform" type="translate" values="0 0;140 0" dur="3.2s" fill="freeze"/>
    <set attributeName="opacity" to="0" begin="3.2s"/>
  </line>

  <!-- Texte gitsearch -->
  <text x="40" y="18" font-family="Courier New" font-size="12" fill="#00d4ff">gitsearch</text>

  <!-- Texte indexed ✓ -->
  <text x="150" y="18" font-family="Courier New" font-size="12" fill="#fff">indexed</text>
  <text x="185" y="18" font-family="Courier New" font-size="12" fill="#fff">
    ✓
    <animate attributeName="fill-opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"/>
  </text>
</svg>