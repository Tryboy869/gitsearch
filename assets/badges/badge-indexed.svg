<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 28" width="210" height="28">
  <rect x="0" y="0" width="140" height="28" fill="#1e293b" rx="4"/>
  <rect x="140" y="0" width="70" height="28" fill="#7b2cbf" rx="4"/>
  <g transform="translate(10, 14)">
    <circle cx="0" cy="0" r="8" fill="#00d4ff"/>
    <path d="M 8 0 L 8 14 L 16 7 Z" fill="#00d4ff"/>
  </g>
  <text x="25" y="20" font-family="Courier New, monospace" font-size="14" fill="#00d4ff">gitsearch</text>
  <text x="150" y="20" font-family="Courier New, monospace" font-size="14" fill="#f1f5f9">indexed &#10003;</text>
  <rect x="0" y="13" width="140" height="2" fill="#00d4ff">
    <animate attributeName="x" from="0" to="140" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="150" y="20" font-family="Courier New, monospace" font-size="14" fill="#f1f5f9">
    <animate attributeName="opacity" from="0.5" to="1" dur="1s" repeatCount="indefinite"/>
    indexed &#10003;
  </text>
  <style>
    @media (prefers-reduced-motion: reduce) {
      rect {
        animation: none;
      }
      text {
        animation: none;
      }
    }
  </style>
</svg>