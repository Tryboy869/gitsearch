<svg viewBox="0 0 400 120" width="400" height="120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="120">
      <stop offset="0%" stop-color="#0a0e1a">
        <animate attributeName="stop-color" values="#0a0e1a;#101626;#0a0e1a" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0a0e1a">
        <animate attributeName="stop-color" values="#0a0e1a;#101626;#0a0e1a" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <clipPath id="typeReveal">
      <rect x="0" y="0" width="0" height="120">
        <animate attributeName="width" values="0;400" dur="2.4s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="letterReveal">
      <rect x="0" y="0" width="0" height="120">
        <animate attributeName="width" values="0;400" dur="2.4s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>
  <rect width="400" height="120" fill="url(#bg)"/>
  <g transform="translate(200 60)">
    <circle r="28" fill="none" stroke="#7b2cbf" stroke-width="4"/>
    <line x1="28" y1="28" x2="48" y2="48" stroke="#7b2cbf" stroke-width="4" stroke-linecap="round"/>
    <line x1="-28" y1="0" x2="28" y2="0" stroke="#00d4ff" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="3s" repeatCount="indefinite"/>
    </line>
    <circle r="2" fill="#00d4ff">
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle r="2" fill="#00d4ff" transform="rotate(120)">
      <animateTransform attributeName="transform" type="rotate" values="120;480" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle r="2" fill="#00d4ff" transform="rotate(240)">
      <animateTransform attributeName="transform" type="rotate" values="240;600" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g clip-path="url(#typeReveal)">
    <text x="200" y="75" font-family="Courier New" font-size="24" fill="#f1f5f9" text-anchor="middle">GITSEARCH</text>
  </g>
  <rect x="140" y="82" width="0" height="2" fill="#00d4ff">
    <animate attributeName="width" values="0;120" dur="1s" begin="2.4s" fill="freeze"/>
  </rect>
  <rect x="260" y="75" width="2" height="24" fill="#f1f5f9">
    <animate attributeName="opacity" values="1;0" dur="0.8s" begin="3.4s" repeatCount="indefinite"/>
  </rect>
</svg>