<svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GITSEARCH">
  <defs>
    <clipPath id="txtClip"><rect x="0" y="0" width="0" height="60"/></clipPath>
    <style>
      .bg{fill:#0a0e1a}.lens{fill:#7b2cbf}.dot{fill:#00d4ff}.txt{fill:#f1f5f9;font:700 28px Courier New,monospace}
      @media (prefers-reduced-motion:reduce){animate,animateTransform{animation:none!important}}
    </style>
  </defs>
  <rect class="bg" width="400" height="120"/>
  <!-- Loupe -->
  <g transform="translate(60,60)">
    <circle class="lens" r="28"/>
    <line x1="28" y1="28" x2="48" y2="48" stroke="#7b2cbf" stroke-width="6" stroke-linecap="round"/>
    <line x1="0" y1="-28" x2="0" y2="28" stroke="#00d4ff" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
    </line>
  </g>
  <!-- 3 orbiting dots -->
  <g>
    <circle class="dot" r="4">
      <animateTransform attributeName="transform" type="rotate" from="0 60 60" to="360 60 60" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="60;88;60" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="60;60;60" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle class="dot" r="4">
      <animateTransform attributeName="transform" type="rotate" from="120 60 60" to="480 60 60" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="60;88;60" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="60;60;60" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle class="dot" r="4">
      <animateTransform attributeName="transform" type="rotate" from="240 60 60" to="600 60 60" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="60;88;60" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="60;60;60" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- Texte -->
  <g clip-path="url(#txtClip)">
    <text class="txt" x="110" y="70">GITSEARCH</text>
    <rect x="110" y="74" width="0" height="3" fill="#00d4ff">
      <animate attributeName="width" from="0" to="160" begin="1.5s" dur="0.8s" fill="freeze"/>
    </rect>
    <rect x="270" y="50" width="3" height="28" fill="#f1f5f9">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
  <rect x="0" y="0" width="400" height="120" fill="#0a0e1a">
    <animate attributeName="width" from="0" to="400" dur="1.5s" fill="freeze"/>
  </rect>
</svg>