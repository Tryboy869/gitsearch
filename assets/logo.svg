<svg viewBox="0 0 120 32" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GitSearch">
  <defs>
    <clipPath id="typewriter">
      <rect x="0" y="0" width="0" height="32">
        <animate attributeName="width" values="0;120" dur="4s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>

  <!-- Loupe -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#7b2cbf" stroke-width="2"/>
  <line x1="24" y1="24" x2="30" y2="30" stroke="#7b2cbf" stroke-width="2" stroke-linecap="round"/>

  <!-- Dots orbitant -->
  <g transform="translate(16 16)">
    <circle r="2" fill="#00d4ff">
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle r="2" fill="#00d4ff">
      <animateTransform attributeName="transform" type="rotate" values="120;480" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle r="2" fill="#00d4ff">
      <animateTransform attributeName="transform" type="rotate" values="240;600" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Texte -->
  <text x="40" y="20" font-family="Courier New, monospace" font-size="14" fill="#f1f5f9" clip-path="url(#typewriter)">GITSEARCH</text>

  <!-- Souligné -->
  <line x1="40" y1="22" x2="112" y2="22" stroke="#7b2cbf" stroke-width="1">
    <animate attributeName="stroke-dasharray" values="0 72;72 0" dur="4s" fill="freeze"/>
  </line>

  <!-- Cursor -->
  <rect x="112" y="14" width="1" height="10" fill="#f1f5f9">
    <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>