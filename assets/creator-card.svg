<svg viewBox="0 0 700 240" width="700" height="240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="borderGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7b2cbf"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7b2cbf"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <clipPath id="reveal">
      <rect x="0" y="0" width="0" height="240">
        <animate attributeName="width" values="0;700" dur="2s" fill="freeze"/>
      </rect>
    </clipPath>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    @media(prefers-reduced-motion:reduce){
      svg *{animation:none!important}
    }
  </style>

  <!-- Fond -->
  <rect width="700" height="240" fill="#0a0e1a"/>

  <!-- Bordure reveal -->
  <rect x="10" y="10" width="680" height="220" fill="none" stroke="url(#borderGrad)" stroke-width="2" stroke-dasharray="1880" stroke-dashoffset="1880">
    <animate attributeName="stroke-dashoffset" values="1880;0" dur="2s" fill="freeze"/>
  </rect>

  <!-- Avatar group -->
  <g transform="translate(60,60)">
    <!-- Rotating ring -->
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="8s" repeatCount="indefinite"/>
      <circle cx="0" cy="0" r="42" fill="none" stroke="url(#ringGrad)" stroke-width="3"/>
    </g>
    <!-- Avatar circle -->
    <circle cx="0" cy="0" r="36" fill="#1e293b"/>
    <!-- Initials -->
    <text x="0" y="6" font-family="Courier New" font-size="24" fill="#a78bfa" text-anchor="middle">DA</text>
    <!-- Online dot -->
    <circle cx="24" cy="-24" r="6" fill="#00d4ff" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Texts staggered -->
  <g clip-path="url(#reveal)">
    <!-- Name -->
    <text x="140" y="50" font-family="Courier New" font-size="20" fill="#e2e8f0">
      Daouda
      <animate attributeName="opacity" values="0;1" dur="0.4s" fill="freeze"/>
    </text>

    <!-- Title -->
    <text x="140" y="75" font-family="Courier New" font-size="14" fill="#a78bfa">
      Designer &amp; Creative Technologist
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.2s" fill="freeze"/>
    </text>

    <!-- Quote -->
    <text x="140" y="105" font-family="Courier New" font-size="12" fill="#94a3b8">
      “Crafting interfaces that breathe with data.”
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.4s" fill="freeze"/>
    </text>

    <!-- Stack -->
    <text x="140" y="135" font-family="Courier New" font-size="12" fill="#e2e8f0">
      Stack:
      <tspan fill="#00d4ff">SVG</tspan> · <tspan fill="#7b2cbf">SMIL</tspan> · <tspan fill="#a78bfa">JS</tspan>
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.8s" fill="freeze"/>
    </text>

    <!-- Research -->
    <text x="140" y="155" font-family="Courier New" font-size="12" fill="#e2e8f0">
      Featured: Semantic search for open-source repos
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.2s" fill="freeze"/>
    </text>

    <!-- Contact -->
    <text x="140" y="185" font-family="Courier New" font-size="12" fill="#94a3b8">
      Contact: daouda@gitsearch.dev
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.6s" fill="freeze"/>
    </text>
  </g>
</svg>