<svg width="700" height="240" viewBox="0 0 700 240" xmlns="http://www.w3.org/2000/svg" color-profile="sRGB">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7b2cbf"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <style>
      @media (prefers-reduced-motion:reduce){
        svg *{animation:none!important}
      }
    </style>
  </defs>
  <rect width="700" height="240" rx="12" fill="#0a0e1a"/>
  <rect x="1" y="1" width="698" height="238" rx="11" fill="none" stroke="url(#g)" stroke-width="2" stroke-dasharray="1700" stroke-dashoffset="1700">
    <animate attributeName="stroke-dashoffset" from="1700" to="0" dur="2s" fill="freeze"/>
  </rect>
  <circle cx="80" cy="120" r="50" fill="#0a0e1a" stroke="url(#g)" stroke-width="2"/>
  <circle cx="80" cy="120" r="54" fill="none" stroke="url(#g)" stroke-width="1" stroke-dasharray="4 4">
    <animateTransform attributeName="transform" type="rotate" from="0 80 120" to="360 80 120" dur="8s" repeatCount="indefinite"/>
  </circle>
  <text x="80" y="130" font-family="Courier New" font-size="28" font-weight="bold" text-anchor="middle" fill="#fff">DA</text>
  <circle cx="80" cy="175" r="4" fill="#00d4ff">
    <animate attributeName="r" values="4;6;4" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="140" y="50" font-family="Courier New" font-size="18" font-weight="bold" fill="#fff" opacity="0">
    Daouda Abdoul Anzize
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.4s" fill="freeze"/>
  </text>
  <text x="140" y="70" font-family="Courier New" font-size="14" fill="#7b2cbf" opacity="0">
    Computational Paradigm Designer
    <animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.4s" fill="freeze"/>
  </text>
  <text x="140" y="90" font-family="Courier New" font-size="13" font-style="italic" fill="#cbd5e1" opacity="0">
    “Code is the canvas, logic the paint.”
    <animate attributeName="opacity" from="0" to="1" begin="0.7s" dur="0.4s" fill="freeze"/>
  </text>
  <text x="140" y="110" font-family="Courier New" font-size="13" fill="#94a3b8" opacity="0">
    Ouagadougou, Burkina Faso
    <animate attributeName="opacity" from="0" to="1" begin="0.9s" dur="0.4s" fill="freeze"/>
  </text>
  <text x="140" y="130" font-family="Courier New" font-size="13" fill="#cbd5e1" opacity="0">
    Stack: Python · Rust · C++ · JS · Go
    <animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="0.4s" fill="freeze"/>
  </text>
  <text x="140" y="150" font-family="Courier New" font-size="13" fill="#cbd5e1" opacity="0">
    Research: NEXUS · Backpressure · WHBooster · APIinBrowser · GITSEARCH
    <animate attributeName="opacity" from="0" to="1" begin="1.3s" dur="0.4s" fill="freeze"/>
  </text>
  <text x="140" y="170" font-family="Courier New" font-size="13" fill="#00d4ff" opacity="0">
    tryboy869.github.io/daa · @Nexusstudio100
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.4s" fill="freeze"/>
  </text>
</svg>