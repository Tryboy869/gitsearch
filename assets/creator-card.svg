<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 240" width="700" height="240">
  <rect x="0" y="0" width="700" height="240" fill="#0a0e1a"/>
  <g transform="translate(50, 50)">
    <circle cx="0" cy="0" r="50" fill="#0a0e1a"/>
    <circle cx="0" cy="0" r="50" stroke="#7b2cbf" stroke-width="5" fill="none">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="10" fill="#00d4ff">
      <animate attributeName="opacity" from="0" to="1" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="r" from="5" to="10" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="120" y="60" font-family="Courier New" font-size="18" font-weight="bold" fill="#f1f5f9">
    <tspan>Daouda Abdoul Anzize</tspan>
    <set attributeName="opacity" to="1" begin="0s" dur="2s"/>
  </text>
  <text x="120" y="90" font-family="Courier New" font-size="14" fill="#7b2cbf">
    <tspan>Computational Paradigm Designer</tspan>
    <set attributeName="opacity" to="1" begin="2s" dur="2s"/>
  </text>
  <text x="120" y="120" font-family="Courier New" font-size="14" font-style="italic" fill="#f1f5f9">
    <tspan>I don't build apps. I build the clay others use to build apps.</tspan>
    <set attributeName="opacity" to="1" begin="4s" dur="2s"/>
  </text>
  <text x="120" y="150" font-family="Courier New" font-size="14" fill="#f1f5f9">
    <tspan>24 ans · Cotonou Bénin → Global Remote</tspan>
    <set attributeName="opacity" to="1" begin="6s" dur="2s"/>
  </text>
  <text x="120" y="180" font-family="Courier New" font-size="14" fill="#f1f5f9">
    <tspan>Stack: Python · Rust · C++ · JavaScript · Go</tspan>
    <set attributeName="opacity" to="1" begin="8s" dur="2s"/>
  </text>
  <text x="120" y="210" font-family="Courier New" font-size="14" fill="#f1f5f9">
    <tspan>Research: NEXUS AXION · Nexus Backpressure Protocol · Weak Hardware Booster · API in Browser · GITSEARCH</tspan>
    <set attributeName="opacity" to="1" begin="10s" dur="2s"/>
  </text>
  <text x="120" y="240" font-family="Courier New" font-size="14" fill="#f1f5f9">
    <tspan>tryboy869.github.io/daa · @Nexusstudio100</tspan>
    <set attributeName="opacity" to="1" begin="12s" dur="2s"/>
  </text>
  <rect x="0" y="0" width="700" height="240" fill="none" stroke="#7b2cbf" stroke-width="5" stroke-dasharray="0 1000">
    <animate attributeName="stroke-dasharray" from="0 1000" to="1000 0" dur="10s" repeatCount="indefinite"/>
  </rect>
</svg>