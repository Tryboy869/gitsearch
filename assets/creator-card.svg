<svg viewBox="0 0 700 240" width="700" height="240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7b2cbf"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <filter id="gl" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .t{fill:#f1f5f9;font-family:'Segoe UI',sans-serif}
      .ti{font-size:18px;font-weight:600}
      .su{font-size:14px;opacity:.8}
      .q{font-size:15px;font-style:italic;opacity:.9}
      .st{font-size:13px;opacity:.7}
      .r{font-size:13px;opacity:.85}
      .c{font-size:12px;opacity:.75}
      @media (prefers-reduced-motion:reduce){*,:root{animation:none!important}}
    </style>
  </defs>

  <rect x="10" y="10" width="680" height="220" rx="12" fill="none" stroke="url(#g)" stroke-width="2">
    <animate attributeName="stroke-dasharray" values="0 1690;1690 0" dur="2s" fill="freeze"/>
  </rect>

  <g transform="translate(80 120)">
    <circle r="50" fill="none" stroke="#7b2cbf" stroke-width="3" stroke-dasharray="314" stroke-dashoffset="314">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dashoffset" values="314;0" dur="1.2s" fill="freeze"/>
    </circle>
    <circle r="46" fill="#0a0e1a"/>
    <text x="0" y="8" text-anchor="middle" class="t" font-size="24" font-weight="600">DA</text>
    <circle cx="35" cy="-35" r="6" fill="#00d4ff" filter="url(#gl)">
      <animate attributeName="r" values="6;9;6" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g class="t">
    <text x="150" y="50" class="ti" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.3s" fill="freeze"/>
      Daouda Abdoul Anzize
    </text>
    <text x="150" y="70" class="su" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.5s" fill="freeze"/>
      Computational Paradigm Designer
    </text>
    <text x="150" y="86" class="su" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.7s" fill="freeze"/>
      Nexus Studio | Cotonou, Bénin → Global Remote
    </text>

    <text x="150" y="110" class="q" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.9s" fill="freeze"/>
      "I don't build apps. I build the clay others use to build apps."
    </text>

    <text x="150" y="130" class="st" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.1s" fill="freeze"/>
      Python · Rust · C++ · JavaScript · Go
    </text>

    <text x="150" y="150" class="r" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.3s" fill="freeze"/>
      Featured research: NEXUS AXION · Nexus Backpressure Protocol · Weak Hardware Booster · API in Browser · GITSEARCH
    </text>

    <text x="150" y="170" class="c" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.5s" fill="freeze"/>
      tryboy869.github.io/daa · @Nexusstudio100
    </text>
  </g>
</svg>