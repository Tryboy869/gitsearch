<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GITSEARCH</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e1a;
            --card: #0d1220;
            --accent: #7b2cbf;
            --cyan: #00d4ff;
            --text: #f1f5f9;
        }
        body {
            font-family: 'Courier New', monospace;
            background-color: var(--bg);
            color: var(--text);
        }
    </style>
</head>
<body>
    <header class="sticky top-0 bg-card py-2 flex justify-between items-center">
        <img src="assets/logo.svg" alt="GITSEARCH" class="h-10">
        <input type="search" id="search-input" class="px-2 py-1 rounded-md focus:ring-accent focus:ring-2" placeholder="Rechercher...">
        <nav>
            <a href="dashboard.html" class="mx-2">Dashboard</a>
            <a href="settings.html" class="mx-2">Settings</a>
        </nav>
        <span id="username" class="text-accent"></span>
    </header>
    <div class="flex flex-col md:flex-row">
        <aside class="hidden md:block w-64 p-4 bg-card">
            <h2 class="text-lg font-bold mb-2">Domaines</h2>
            <ul>
                <li><a href="#" class="block py-1">AI</a></li>
                <li><a href="#" class="block py-1">Systems</a></li>
                <li><a href="#" class="block py-1">Security</a></li>
                <!-- 10 autres domaines -->
            </ul>
            <h2 class="text-lg font-bold mt-4 mb-2">Trending Tags</h2>
            <ul>
                <li><a href="#" class="block py-1">machine learning</a></li>
                <li><a href="#" class="block py-1">nlp</a></li>
                <li><a href="#" class="block py-1">distributed</a></li>
                <!-- 12 autres tags -->
            </ul>
            <h2 class="text-lg font-bold mt-4 mb-2">Historique</h2>
            <ul id="search-history">
                <!-- 8 dernières recherches -->
            </ul>
            <button class="bg-accent py-1 px-2 rounded-md mt-4">Index your repo</button>
        </aside>
        <main class="flex-1 p-4">
            <div class="flex flex-col md:flex-row mb-4">
                <div class="flex-1">
                    <label class="block text-lg font-bold mb-2">Filtres</label>
                    <div class="flex flex-wrap mb-2">
                        <input type="radio" id="stars" name="filter" value="stars" class="mr-2">
                        <label for="stars" class="mr-4">Stars</label>
                        <input type="radio" id="recent" name="filter" value="recent" class="mr-2">
                        <label for="recent" class="mr-4">Récents</label>
                        <input type="radio" id="anciens" name="filter" value="anciens" class="mr-2">
                        <label for="anciens" class="mr-4">Anciens</label>
                    </div>
                    <div class="flex flex-wrap mb-2">
                        <select id="language" class="block py-1 px-2 rounded-md mr-2">
                            <option value="all">Toutes les langues</option>
                            <option value="python">Python</option>
                            <option value="javascript">JavaScript</option>
                            <!-- 10 autres langues -->
                        </select>
                        <select id="stars" class="block py-1 px-2 rounded-md mr-2">
                            <option value="all">Tous les repos</option>
                            <option value="10+">10+</option>
                            <option value="100+">100+</option>
                            <option value="1k+">1k+</option>
                            <option value="10k+">10k+</option>
                        </select>
                    </div>
                    <p id="result-count" class="text-lg font-bold mb-2"></p>
                </div>
                <div class="md:ml-4">
                    <button id="search-button" class="bg-accent py-1 px-2 rounded-md">Rechercher</button>
                </div>
            </div>
            <div id="results" class="flex flex-wrap justify-center"></div>
        </main>
    </div>
    <script>
        // Expand semantic search terms
        function expandSemantic(query) {
            const terms = {
                'machine learning': ['ml', 'deep-learning'],
                'nlp': ['natural language processing'],
                'distributed': ['distributed systems'],
                // 17 autres termes
            };
            return query.split(' ').map(word => {
                if (terms[word]) {
                    return terms[word].join(' ');
                }
                return word;
            }).join(' ');
        }

        // Perform search
        async function search(query) {
            const expandedQuery = expandSemantic(query);
            const filters = {
                language: document.getElementById('language').value,
                stars: document.getElementById('stars').value,
            };
            const results = await Promise.allSettled([
                fetch(`https://api.github.com/search/repositories?q=${expandedQuery}&sort=stars&order=desc&per_page=20`),
                fetch(`https://api.github.com/search/repositories?q=${expandedQuery}+in:name&sort=stars&order=desc&per_page=20`),
                fetch(`https://api.github.com/search/code?q=${expandedQuery}+in:file+filename:README&sort=stars&order=desc&per_page=20`),
            ]);
            const data = await Promise.all(results.map(result => result.value.json()));
            const mergedResults = [...data[0].items, ...data[1].items, ...data[2].items];
            const uniqueResults = mergedResults.filter((result, index, self) => self.findIndex(r => r.full_name === result.full_name) === index);
            return uniqueResults;
        }

        // Display results
        function displayResults(results) {
            const resultsContainer = document.getElementById('results');
            resultsContainer.innerHTML = '';
            results.forEach(result => {
                const card = document.createElement('div');
                card.classList.add('bg-card', 'p-4', 'rounded-md', 'mb-4');
                card.innerHTML = `
                    <img src="${result.owner.avatar_url}" alt="${result.owner.login}" class="h-10 w-10 rounded-full">
                    <h2 class="text-lg font-bold mb-2">${result.full_name}</h2>
                    <p class="text-sm mb-2">${result.description}</p>
                    <ul class="flex flex-wrap mb-2">
                        ${result.topics.map(topic => `<li class="mr-2">${topic}</li>`).join('')}
                    </ul>
                    <p class="text-sm mb-2">${result.stargazers_count} stars, ${result.forks_count} forks</p>
                `;
                resultsContainer.appendChild(card);
            });
        }

        // Handle search button click
        document.getElementById('search-button').addEventListener('click', async () => {
            const query = document.getElementById('search-input').value;
            const results = await search(query);
            displayResults(results);
        });

        // Initialize IndexedDB
        const db = await indexedDB.open('gitsearch_v1', 1);
        db.createObjectStore('searches', { keyPath: 'id' });
        db.createObjectStore('viewed', { keyPath: 'id' });
        db.createObjectStore('config', { keyPath: 'id' });

        // Load search history
        const searchHistory = await db.transaction('searches').objectStore('searches').getAll();
        document.getElementById('search-history').innerHTML = searchHistory.map(search => `<li>${search.query}</li>`).join('');
    </script>
</body>
</html>
