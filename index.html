<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <title>GITSEARCH — Recherche Sémantique de Repos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
  <style>
    :root{--bg:#0a0e1a;}
    body{background:var(--bg);color:#e2e8f0;font-family:Courier New,monospace;}
    .bg-bg{background:var(--bg);}
    .text-violet{color:#a78bfa;}
    .border-violet{border-color:#a78bfa;}
    .hover\\:border-violet:hover{border-color:#a78bfa;}
    .shadow-violet{box-shadow:0 0 12px #a78bfa;}
    .fadeIn{animation:fadeIn .4s ease-out forwards;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  </style>
</head>
<body class="antialiased">
<header id="header" class="fixed top-0 left-0 right-0 h-16 bg-bg bg-opacity-90 backdrop-blur z-40 flex items-center justify-between px-4 border-b border-gray-800">
  <a href="/" class="flex items-center space-x-2">
    <img src="assets/logo.svg" alt="GITSEARCH" class="h-8"/>
  </a>
  <div class="flex-1 max-w-xl mx-4">
    <input id="search" type="search" placeholder="Recherche sémantique…" class="w-full px-3 py-2 bg-gray-900 border border-gray-700 rounded focus:outline-none focus:border-violet"/>
  </div>
  <nav class="flex items-center space-x-3">
    <a href="dashboard.html" class="text-sm hover:text-violet">Dashboard</a>
    <a href="settings.html" class="text-sm hover:text-violet">Settings</a>
    <button id="menu-btn" class="md:hidden text-sm">☰</button>
  </nav>
</header>

<aside id="sidebar" class="fixed top-16 left-0 w-48 h-[calc(100%-4rem)] overflow-y-auto p-4 border-r border-gray-800">
  <section>
    <h2 class="text-xs uppercase tracking-widest text-gray-400 mb-2">Domaines</h2>
    <div class="space-y-1 text-sm">
      <button data-domain="ai">AI</button>
      <button data-domain="crypto">Crypto</button>
      <button data-domain="db">Database</button>
      <button data-domain="distributed">Distributed</button>
      <button data-domain="embedded">Embedded</button>
      <button data-domain="finance">Finance</button>
      <button data-domain="gamedev">Gamedev</button>
      <button data-domain="gui">GUI</button>
      <button data-domain="llm">LLM</button>
      <button data-domain="mobile">Mobile</button>
      <button data-domain="science">Science</button>
      <button data-domain="security">Security</button>
      <button data-domain="wasm">WASM</button>
    </div>
  </section>

  <section class="mt-6">
    <h2 class="text-xs uppercase tracking-widest text-gray-400 mb-2">Tags populaires</h2>
    <div id="trending-tags" class="flex flex-wrap gap-1 text-xs"></div>
  </section>

  <section class="mt-6">
    <h2 class="text-xs uppercase tracking-widest text-gray-400 mb-2">Historique</h2>
    <div id="history" class="space-y-1 text-xs"></div>
  </section>
</aside>

<main class="ml-0 md:ml-48 pt-16 min-h-screen">
  <div id="filters" class="px-4 py-3 flex flex-wrap items-center gap-3 text-sm">
    <select id="sort" class="bg-gray-900 border border-gray-700 rounded px-2 py-1">
      <option value="stars">Stars</option>
      <option value="updated">Récents</option>
      <option value="created">Anciens</option>
    </select>
    <select id="lang" class="bg-gray-900 border border-gray-700 rounded px-2 py-1">
      <option value="">Langue</option>
    </select>
    <label class="flex items-center gap-2">
      <span>Min ⭐</span>
      <input id="stars-min" type="number" min="0" value="0" class="w-20 bg-gray-900 border border-gray-700 rounded px-2 py-1"/>
    </label>
  </div>

  <div id="results" class="px-4 pb-8 grid gap-4 md:grid-cols-2 lg:grid-cols-3"></div>
</main>

<div id="drawer-backdrop" class="fixed inset-0 bg-black bg-opacity-50 z-30 hidden"></div>
<aside id="drawer" class="fixed top-0 right-0 w-64 h-full bg-bg z-40 transform translate-x-full transition-transform p-4 overflow-y-auto border-l border-gray-800">
  <button id="close-drawer" class="absolute top-4 right-4">✕</button>
  <div class="mt-12 space-y-6">
    <section>
      <h2 class="text-xs uppercase tracking-widest text-gray-400 mb-2">Domaines</h2>
      <div class="space-y-1 text-sm">
        <button data-domain="ai">AI</button>
        <button data-domain="crypto">Crypto</button>
        <button data-domain="db">Database</button>
        <button data-domain="distributed">Distributed</button>
        <button data-domain="embedded">Embedded</button>
        <button data-domain="finance">Finance</button>
        <button data-domain="gamedev">Gamedev</button>
        <button data-domain="gui">GUI</button>
        <button data-domain="llm">LLM</button>
        <button data-domain="mobile">Mobile</button>
        <button data-domain="science">Science</button>
        <button data-domain="security">Security</button>
        <button data-domain="wasm">WASM</button>
      </div>
    </section>
    <section>
      <h2 class="text-xs uppercase tracking-widest text-gray-400 mb-2">Tags populaires</h2>
      <div id="trending-tags-drawer" class="flex flex-wrap gap-1 text-xs"></div>
    </section>
    <section>
      <h2 class="text-xs uppercase tracking-widest text-gray-400 mb-2">Historique</h2>
      <div id="history-drawer" class="space-y-1 text-xs"></div>
    </section>
  </div>
</aside>

<script>
/* ---------- CONFIG ---------- */
const SEMANTIC={
  'ai':['ai','artificial-intelligence','neural','pytorch','tensorflow'],
  'llm':['llm','large-language-model','gpt','transformers'],
  'nlp':['nlp','natural-language-processing','text-mining'],
  'crypto':['cryptography','encryption','blockchain','security'],
  'security':['security','vulnerability','exploit','audit'],
  'distributed':['distributed-systems','microservices','cluster'],
  'embedded':['embedded','rtos','microcontroller','firmware','iot'],
  'compiler':['compiler','parser','interpreter','llvm','jit'],
  'async':['async','asynchronous','concurrency','tokio'],
  'devops':['devops','docker','kubernetes','terraform'],
  'wasm':['webassembly','wasm','emscripten'],
  'gamedev':['game-development','game-engine','opengl','vulkan'],
  'gui':['gui','ui','frontend','react','vue','svelte'],
  'api':['api','rest','graphql','fastapi','express'],
  'db':['database','sql','nosql','postgres','mongodb'],
  'mobile':['mobile','android','ios','flutter','react-native'],
  'finance':['finance','trading','bitcoin','ethereum','defi'],
  'science':['science','research','simulation','physics']
};
const TRENDING=['rust','python','typescript','go','solidity','zig','nim','kotlin','swift','cpp','c','java','ruby','php','elixir'];
const DB_NAME='gitsearch_v1';
const MAX_HISTORY=8;

/* ---------- UTILS ---------- */
function expandSemantic(term){
  const t=term.toLowerCase();
  const out=new Set([t]);
  for(const[k,v] of Object.entries(SEMANTIC)){
    if(t.includes(k)||v.some(x=>t.includes(x))) v.forEach(x=>out.add(x));
  }
  return Array.from(out);
}
function qs(s){return document.querySelector(s);}
function qsa(s){return document.querySelectorAll(s);}
function el(tag,attrs={},...kids){
  const e=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));
  kids.flat().forEach(k=>e.appendChild(typeof k==='string'?document.createTextNode(k):k));
  return e;
}

/* ---------- DB ---------- */
let db;
async function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,1);
    r.onupgradeneeded=()=>{
      const d=r.result;
      if(!d.objectStoreNames.contains('searches')) d.createObjectStore('searches',{keyPath:'id',autoIncrement:true});
      if(!d.objectStoreNames.contains('viewed')) d.createObjectStore('viewed',{keyPath:'full_name'});
      if(!d.objectStoreNames.contains('config')) d.createObjectStore('config',{keyPath:'key'});
    };
    r.onsuccess=()=>res(r.result);
    r.onerror=()=>rej(r.error);
  });
}
// Wrappers IDBRequest → Promise (tx.complete n'existe pas en IndexedDB natif)
function idbReq(req){return new Promise((res,rej)=>{req.onsuccess=()=>res(req.result);req.onerror=()=>rej(req.error);});}
function idbTx(tx){return new Promise((res,rej)=>{tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);tx.onabort=()=>rej(tx.error);});}
async function dbPut(store,data){const tx=db.transaction(store,'readwrite');tx.objectStore(store).put(data);return idbTx(tx);}
async function dbGet(store,key){return idbReq(db.transaction(store,'readonly').objectStore(store).get(key));}
async function dbDel(store,key){const tx=db.transaction(store,'readwrite');tx.objectStore(store).delete(key);return idbTx(tx);}
async function dbAll(store){return idbReq(db.transaction(store,'readonly').objectStore(store).getAll());}

/* ---------- GITHUB ---------- */
let ctrl=new AbortController();
async function github(path,token){
  ctrl.abort(); ctrl=new AbortController();
  const headers={'Accept':'application/vnd.github.v3+json'};
  if(token) headers.Authorization=`token ${token}`;
  const r=await fetch('https://api.github.com'+path,{headers,signal:ctrl.signal});
  if(!r.ok) throw new Error(r.statusText);
  return r.json();
}
async function search(term,token){
  const expanded=expandSemantic(term).join(' OR ').slice(0,128);
  const slug=term.toLowerCase().replace(/\s+/g,'-');
  const [a,b,c]=await Promise.allSettled([
    github(`/search/repositories?q=${encodeURIComponent(expanded)}&sort=stars&per_page=30`,token),
    github(`/search/repositories?q=${encodeURIComponent(slug)}+in:name&per_page=30`,token),
    token? github(`/search/code?q=${encodeURIComponent(term)}+in:file+filename:README.md&per_page=30`,token):Promise.resolve({items:[]})
  ]);
  const seen=new Set(),repos=[];
  const push=r=>{if(!r||!r.items)return;r.items.forEach(item=>{const repo=item.repository||item;if(!seen.has(repo.full_name)){seen.add(repo.full_name);repos.push(repo);}});};
  if(a.status==='fulfilled') push(a.value);
  if(b.status==='fulfilled') push(b.value);
  if(c.status==='fulfilled') push(c.value);
  return repos;
}

/* ---------- RENDER ---------- */
function langColor(lang){
  const map={'JavaScript':'#f1e05a','TypeScript':'#2b7489','Python':'#3572A5','Rust':'#dea584','Go':'#00ADD8','C++':'#f34b7d','C':'#555555','Java':'#b07219','Ruby':'#701516','PHP':'#4F5D95','Swift':'#ffac45','Kotlin':'#F18E33','Dart':'#00B4AB','C#':'#239120','Solidity':'#AA6746'};
  return map[lang]||'#cccccc';
}
function card(repo,idx){
  const topics=(repo.topics||[]).slice(0,5);
  const hasGitsearch=topics.includes('gitsearch');
  const viewed=dbGet('viewed',repo.full_name).then(v=>v?qs(`[data-index="${idx}"]`)?.classList.add('opacity-60'):0);
  const e=el('article',
    {class:'bg-gray-900 border border-gray-800 rounded p-3 hover:border-violet hover:shadow-violet transition cursor-pointer fadeIn',style:`animation-delay:${idx*60}ms`,'data-index':idx,'data-full_name':repo.full_name},
    el('div',{class:'flex items-center justify-between'},
      el('div',{class:'flex items-center space-x-2'},
        el('img',{src:repo.owner.avatar_url+'&s=24',loading:'lazy',width:24,height:24,class:'rounded-full'}),
        el('a',{href:repo.html_url,target:'_blank',class:'text-violet hover:underline'},repo.full_name)
      ),
      hasGitsearch?el('span',{class:'text-xs text-violet'},'✦ GITSEARCH'):''
    ),
    el('p',{class:'text-xs text-gray-400 mt-2 line-clamp-2'},repo.description||''),
    el('div',{class:'flex flex-wrap gap-1 mt-2'},...topics.map(t=>el('button',{class:'text-xs bg-gray-800 px-2 py-1 rounded',onclick:()=>runSearch(t)},t))),
    el('div',{class:'flex items-center gap-3 text-xs text-gray-400 mt-3'},
      el('span',{},'⭐ '+repo.stargazers_count),
      el('span',{},'🍴 '+repo.forks_count),
      el('span',{class:'flex items-center space-x-1'},el('span',{class:'inline-block w-2 h-2 rounded-full',style:`background:${langColor(repo.language)}`}),el('span',{},repo.language||'')),
      el('span',{},repo.license?repo.license.spdx_id:''),
      el('span',{},new Date(repo.pushed_at).toLocaleDateString())
    )
  );
  e.onclick=()=>{dbPut('viewed',{full_name:repo.full_name,ts:Date.now()});};
  return e;
}
function renderLangs(repos){
  const counts={};
  repos.forEach(r=>{if(r.language) counts[r.language]=(counts[r.language]||0)+1;});
  const sel=qs('#lang'); sel.innerHTML='<option value="">Langue</option>';
  Object.entries(counts).sort((a,b)=>b[1]-a[1]).forEach(([l])=>sel.appendChild(el('option',{value:l},l)));
}
async function renderResults(repos){
  const cont=qs('#results'); cont.innerHTML='';
  const frag=document.createDocumentFragment();
  repos.forEach((r,i)=>frag.appendChild(card(r,i)));
  cont.appendChild(frag);
  renderLangs(repos);
}

/* ---------- HISTORY ---------- */
async function addHistory(term){
  const searches=await dbAll('searches');
  const exists=searches.find(s=>s.term===term);
  if(exists) exists.ts=Date.now(); else searches.push({term,ts:Date.now()});
  searches.sort((a,b)=>b.ts-a.ts);
  const keep=searches.slice(0,MAX_HISTORY);
  const tx=db.transaction('searches','readwrite'); const st=tx.objectStore('searches'); st.clear(); keep.forEach(s=>st.put(s)); await idbTx(tx);
  renderHistory();
}
function renderHistory(){
  dbAll('searches').then(arr=>{
    const h=qs('#history'),hd=qs('#history-drawer');
    h.innerHTML=''; hd.innerHTML='';
    arr.forEach(({term})=>{
      const mk=()=>{const a=el('a',{href:'#',class:'block text-gray-400 hover:text-violet cursor-pointer'},term);a.onclick=e=>{e.preventDefault();qs('#search').value=term;runSearch(term);};return a;};
      h.appendChild(mk()); hd.appendChild(mk());
    });
  });
}

/* ---------- SEARCH ---------- */
let lastTerm='';
async function runSearch(term){
  if(!term) return;
  lastTerm=term;
  qs('#results').innerHTML='<div class="text-sm text-gray-400">Recherche…</div>';
  const cfg=await dbGet('config','token'); const token=cfg?cfg.value:null;
  try{
    const repos=await search(term,token);
    await addHistory(term);
    await renderResults(repos);
  }catch(e){
    qs('#results').innerHTML='<div class="text-sm text-red-400">Erreur : '+e.message+'</div>';
  }
}

/* ---------- FILTERS ---------- */
function applyFilters(){
  const sort=qs('#sort').value;
  const lang=qs('#lang').value;
  const min=Number(qs('#stars-min').value)||0;
  const cards=qsa('#results article');
  const arr=Array.from(cards).map(c=>{
    const stars=Number(c.querySelector('span').textContent.replace(/[^0-9]/g,''));
    const l=c.querySelector('span:nth-of-type(3)').textContent.trim();
    return {el:c,stars,lang:l};
  });
  arr.forEach(({el,stars,lang:l})=>{
    el.style.display=(l===lang||!lang)&&(stars>=min)?'':'none';
  });
  if(sort!=='stars') arr.sort((a,b)=>sort==='updated'?new Date(b.el.querySelector('span:last-child').textContent)-new Date(a.el.querySelector('span:last-child').textContent):new Date(a.el.querySelector('span:last-child').textContent)-new Date(b.el.querySelector('span:last-child').textContent));
  const parent=qs('#results'); arr.forEach(({el})=>parent.appendChild(el));
}

/* ---------- INIT ---------- */
async function init(){
  db=await openDB();
  // trending tags
  const tg=qs('#trending-tags'),tgd=qs('#trending-tags-drawer');
  TRENDING.slice(0,15).forEach(t=>{
    const mk=()=>{const b=el('button',{class:'bg-gray-800 px-2 py-1 rounded text-xs hover:bg-gray-700'},t);b.onclick=()=>runSearch(t);return b;};
    tg.appendChild(mk()); tgd.appendChild(mk());
  });
  renderHistory();
  // events
  qs('#search').addEventListener('keydown',e=>{if(e.key==='Enter') runSearch(e.target.value);});
  qs('#menu-btn').onclick=()=>{qs('#drawer').classList.remove('translate-x-full');qs('#drawer-backdrop').classList.remove('hidden');};
  qs('#close-drawer').onclick=closeDrawer;
  qs('#drawer-backdrop').onclick=closeDrawer;
  qsa('#sidebar button[data-domain],#drawer button[data-domain]').forEach(b=>b.onclick=()=>runSearch(b.dataset.domain));
  qs('#sort').onchange=applyFilters;
  qs('#lang').onchange=applyFilters;
  qs('#stars-min').oninput=applyFilters;
}
function closeDrawer(){
  qs('#drawer').classList.add('translate-x-full');
  qs('#drawer-backdrop').classList.add('hidden');
}
init();
</script>
</body>
</html>
